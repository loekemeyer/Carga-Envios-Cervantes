<!doctype html>
<html lang="es">
  <head>
    <script src="../auth-guard.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Verificacion Madres</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="VerifMadres.css" />
  </head>
  <body>
    <div class="card">
      <button onclick="window.location.href='../Inicio/index.html'" class="tallerista-btn btn-volver-home">
        ← Volver al inicio
      </button>

      <h1>Verificacion Madres</h1>

      <div class="tabs">
        <button class="tab active" data-tabla="SC Kg">SC Kg</button>
        <button class="tab" data-tabla="SP Kg">SP Kg</button>
        <button class="tab" data-tabla="Remaches SC">Remaches SC</button>
        <button class="tab" data-tabla="Remaches SP">Remaches SP</button>
        <button class="tab" data-tabla="Matrices">Matrices</button>
      </div>

      <div class="filtros">
        <input type="text" id="searchInput" class="search-input" placeholder="Buscar por sector o descripcion..." />
        <label class="chk-label"><input type="checkbox" id="chkFaltantes" /> Solo con faltantes</label>
      </div>

      <div id="status" class="status">Cargando...</div>
      <div id="result"></div>
    </div>

    <script src="VerifMadres.js"></script>
  </body>
</html>
