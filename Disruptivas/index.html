<!doctype html>
<html lang="es">
<head>
  <script src="../auth-guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Producciones Disruptivas</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../Informes/informes.css" />
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="header">
        <div>
          <h1>Producciones Disruptivas</h1>
          <p class="muted">Registros con puntaje mayor a 5 o menor a -5</p>
        </div>
        <button class="btn btn-dark" onclick="window.location.href='../Inicio/index.html'">Inicio</button>
      </div>

      <div class="filtros">
        <div class="field">
          <label>Desde</label>
          <input type="date" id="fechaDesde" />
        </div>
        <div class="field">
          <label>Hasta</label>
          <input type="date" id="fechaHasta" />
        </div>
      </div>

      <div id="empGrid" class="emp-chips hidden"></div>

      <div style="margin-bottom:8px">
        <button id="btnExcelDisr" class="btn btn-dark hidden" onclick="exportarExcelDisruptivas()">Excel</button>
      </div>

      <div id="status" class="status"></div>
      <div id="result"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="disruptivas.js"></script>
</body>
</html>
