<!DOCTYPE html>
<html lang="es">
<head>
  <script src="../auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABM Operarios</title>
  <link rel="icon" href="data:," />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #d9d9de;
      margin: 0;
      padding: 16px;
      color: #222;
    }
    .hidden { display: none !important; }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .btn-back {
      background: #f5f5f5;
      border: 2px solid #ccc;
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 14px;
      color: #555;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    .btn-back:hover { border-color: #888; }
    .top-bar h1 { font-size: 22px; color: #111; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
    }
    .tab-btn {
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 700;
      border: 2px solid #ccc;
      background: #f5f5f5;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:first-child { border-radius: 10px 0 0 10px; }
    .tab-btn:last-child { border-radius: 0 10px 10px 0; }
    .tab-btn.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    /* Card */
    .card {
      background: #fff;
      border: 1px solid #cfcfcf;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .card-header {
      background: #111;
      color: #fff;
      padding: 16px 22px;
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-body { padding: 18px 22px; }

    /* Toolbar */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }
    .search-input {
      height: 40px;
      border: 1px solid #c9d1d9;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 14px;
      outline: none;
      min-width: 240px;
      flex: 1;
      max-width: 360px;
    }
    .search-input:focus { border-color: #4b89ff; }
    .btn {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    .row-count { font-size: 13px; color: #666; padding: 10px 0 6px; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: #f5f5f7;
      border-bottom: 2px solid #ddd;
      padding: 10px 8px;
      text-align: left;
      font-weight: 700;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }
    tbody td {
      padding: 8px 8px;
      border-bottom: 1px solid #eee;
      white-space: nowrap;
    }
    tbody tr:nth-child(even) { background: #fafafa; }
    tbody tr:hover { background: #eef2ff; }

    .btn-action {
      border: none;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-edit { background: #e8eaf6; color: #283593; }
    .btn-edit:hover { background: #c5cae9; }
    .btn-disc { background: #fee2e2; color: #b91c1c; margin-left: 4px; }
    .btn-disc:hover { background: #fecaca; }
    .btn-reactivar { background: #dcfce7; color: #166534; margin-left: 4px; }
    .btn-reactivar:hover { background: #bbf7d0; }

    /* Tipo/Estado chips */
    .chips-row { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:8px; }
    .chips-label { font-size:12px; color:#555; font-weight:700; margin-right:4px; }
    .chip {
      padding:4px 10px; border:1px solid #c9d1d9; background:#fff; cursor:pointer;
      border-radius:8px; font-size:12px; transition:all .12s;
    }
    .chip:hover { background:#f3f4f6; border-color:#999; }
    .chip.active { background:#111; color:#fff; border-color:#111; }
    .chip-todos { font-weight:700; }
    .badge {
      display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px;
      font-weight:700; white-space:nowrap;
    }
    .badge-tipo { background:#eef2ff; color:#3730a3; }
    .badge-disc { background:#fee2e2; color:#b91c1c; }
    .row-disc { opacity: 0.55; }
    .desc-anterior { color:#888; font-size:12px; font-style:italic; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-box {
      background: #fff;
      border-radius: 18px;
      width: 440px;
      max-width: 94vw;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .modal-header {
      background: #111;
      color: #fff;
      padding: 16px 22px;
      font-weight: 700;
      font-size: 16px;
    }
    .modal-body {
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal-field { display: flex; flex-direction: column; gap: 4px; }
    .modal-field label { font-size: 12px; font-weight: 700; color: #444; }
    .modal-field input,
    .modal-field select {
      height: 40px;
      border: 1px solid #c9d1d9;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }
    .modal-field input:disabled { background: #f3f4f6; color: #888; }
    .modal-field input:focus { border-color: #4b89ff; }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 14px 22px;
      border-top: 1px solid #e3e6eb;
    }
    .btn-modal {
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-cancel { background: #f3f4f6; color: #333; }
    .btn-cancel:hover { background: #e5e7eb; }
    .btn-save { background: #111; color: #fff; }
    .btn-save:hover { opacity: 0.85; }

    .loading-msg { text-align: center; padding: 30px; color: #888; font-size: 14px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      color: #fff;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      z-index: 999;
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 700px) {
      .toolbar { flex-direction: column; align-items: stretch; }
      .search-input { max-width: 100%; min-width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <a href="../Inicio/" class="btn-back">&#8592; Volver</a>
    <h1>ABM Operarios</h1>
  </div>

  <!-- ===================== OPERARIOS ===================== -->
  <div class="card">
    <div class="card-header">Operarios</div>
    <div class="card-body">
      <div class="toolbar">
        <input class="search-input" id="searchOperario" placeholder="Buscar por legajo o nombre..." />
        <button class="btn" id="btnNuevoOperario">+ Nuevo Operario</button>
      </div>
      <div class="row-count" id="countOperarios"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Legajo</th>
              <th>Nombre</th>
              <th>Sede</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyOperarios">
            <tr><td colspan="4" class="loading-msg">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ===================== MODAL OPERARIO ===================== -->
  <div id="modalOperario" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header" id="modalOperarioTitle">Nuevo Operario</div>
      <div class="modal-body">
        <div class="modal-field">
          <label>Legajo</label>
          <input type="text" id="oLegajo" />
        </div>
        <div class="modal-field">
          <label>Nombre</label>
          <input type="text" id="oNombre" />
        </div>
        <div class="modal-field">
          <label>Sede</label>
          <input type="text" id="oSede" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal btn-cancel" id="btnCancelOperario">Cancelar</button>
        <button class="btn-modal btn-save" id="btnSaveOperario">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

<script>
/*
  NOTA RLS: Para que INSERT y UPDATE funcionen correctamente, asegurate de
  tener configuradas las Row Level Security policies en Supabase para la
  tabla "Empleados" que permitan insert/update al rol anon (o al rol
  autenticado que corresponda).
*/

const SUPABASE_URL = 'https://hrxfctzncixxqmpfhskv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhyeGZjdHpuY2l4eHFtcGZoc2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjQyNjEsImV4cCI6MjA4ODMwMDI2MX0.4L6wguch8UZGhC2VpzrWcCjJGUV-IkYsl9JoCWrOLUs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ---------- HELPERS ---------- */
function $(id) { return document.getElementById(id); }
function show(el) { el.classList.remove('hidden'); }
function hide(el) { el.classList.add('hidden'); }

function toast(msg, ms = 3500) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function parseHMS(str) {
  if (!str) return 0;
  const p = String(str).split(':').map(Number);
  return (p[0] || 0) * 3600 + (p[1] || 0) * 60 + (p[2] || 0);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

/* ================================================================
   OPERARIOS
   ================================================================ */
let allOperarios = [];
let editingOperarioId = null;

async function loadOperarios() {
  const { data, error } = await sb.from('Empleados').select('*').order('Legajo', { ascending: true });
  if (error) { toast('Error cargando operarios: ' + error.message); return; }
  allOperarios = data || [];
  renderOperarios();
}

function renderOperarios() {
  const q = $('searchOperario').value.toLowerCase().trim();
  const filtered = q
    ? allOperarios.filter(o =>
        (o.Legajo || '').toLowerCase().includes(q) ||
        (o.Empleado || '').toLowerCase().includes(q))
    : allOperarios;

  $('countOperarios').textContent = filtered.length + ' registro' + (filtered.length !== 1 ? 's' : '');

  if (!filtered.length) {
    $('tbodyOperarios').innerHTML = '<tr><td colspan="4" class="loading-msg">Sin resultados</td></tr>';
    return;
  }
  $('tbodyOperarios').innerHTML = filtered.map(o => `
    <tr>
      <td>${esc(o.Legajo)}</td>
      <td>${esc(o.Empleado)}</td>
      <td>${esc(o.Sede)}</td>
      <td><button class="btn-action btn-edit" onclick="editOperario(${o.id})">Editar</button></td>
    </tr>`).join('');
}

$('searchOperario').addEventListener('input', renderOperarios);

$('btnNuevoOperario').addEventListener('click', () => {
  editingOperarioId = null;
  $('modalOperarioTitle').textContent = 'Nuevo Operario';
  $('oLegajo').value = '';
  $('oLegajo').disabled = false;
  $('oNombre').value = '';
  $('oSede').value = '';
  show($('modalOperario'));
});

window.editOperario = function(id) {
  const o = allOperarios.find(x => x.id === id);
  if (!o) return;
  editingOperarioId = id;
  $('modalOperarioTitle').textContent = 'Editar Operario';
  $('oLegajo').value = o.Legajo || '';
  $('oLegajo').disabled = true;
  $('oNombre').value = o.Empleado || '';
  $('oSede').value = o.Sede || '';
  show($('modalOperario'));
};

$('btnCancelOperario').addEventListener('click', () => hide($('modalOperario')));
$('modalOperario').addEventListener('click', e => { if (e.target === $('modalOperario')) hide($('modalOperario')); });

$('btnSaveOperario').addEventListener('click', async () => {
  const legajo = $('oLegajo').value.trim();
  const nombre = $('oNombre').value.trim();
  const sede = $('oSede').value.trim();

  if (!legajo) { toast('Ingresa el legajo'); return; }

  $('btnSaveOperario').disabled = true;

  if (editingOperarioId) {
    const { error } = await sb.from('Empleados').update({
      Empleado: nombre,
      Sede: sede
    }).eq('id', editingOperarioId);

    if (error) { toast('Error: ' + error.message); $('btnSaveOperario').disabled = false; return; }
  } else {
    const { error } = await sb.from('Empleados').insert({
      Legajo: legajo,
      Empleado: nombre,
      Sede: sede
    });
    if (error) { toast('Error: ' + error.message); $('btnSaveOperario').disabled = false; return; }
  }

  $('btnSaveOperario').disabled = false;
  hide($('modalOperario'));
  toast(editingOperarioId ? 'Operario actualizado' : 'Operario creado');
  await loadOperarios();
});

/* ---------- INIT ---------- */
loadOperarios();
</script>
</body>
</html>
