<!DOCTYPE html>
<html lang="es">
<head>
  <script src="../auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor en Vivo</title>
  <link rel="icon" href="data:," />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', Arial, sans-serif; background: #d9d9de; margin: 0; padding: 16px; color: #222; }

    .top-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .btn-back { background: #f5f5f5; border: 2px solid #ccc; border-radius: 999px; padding: 8px 18px; font-size: 14px; color: #555; cursor: pointer; text-decoration: none; font-weight: 600; }
    .btn-back:hover { border-color: #888; }
    .top-bar h1 { font-size: 22px; color: #111; }
    .live-dot { display: inline-block; width: 10px; height: 10px; background: #f44336; border-radius: 50%; animation: pulse 1.5s infinite; margin-left: 8px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .update-info { font-size: 12px; color: #888; margin-left: auto; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 14px; }
    .op-card { font-size: 15px; }
    .op-header { padding: 14px 18px !important; font-size: 17px !important; }
    .op-header .legajo { font-size: 14px !important; }
    .status-badge { padding: 5px 14px !important; font-size: 14px !important; }
    .op-body { padding: 14px 18px !important; }
    .op-detail { font-size: 14px !important; }
    .timer { font-size: 22px !important; }

    .op-card {
      background: #fff; border: 1px solid #cfcfcf; border-radius: 14px; overflow: hidden;
      transition: box-shadow 0.2s; cursor: pointer;
    }
    .op-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .op-header {
      padding: 12px 16px; font-weight: 700; font-size: 15px; display: flex; justify-content: space-between; align-items: center;
    }
    .op-header .legajo { color: #888; font-size: 13px; font-weight: 400; }
    .op-body { padding: 12px 16px; }

    .op-status { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .status-badge {
      display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; color: #fff;
    }
    .badge-produccion { background: #2e7d32; }
    .badge-tm { background: #f57c00; }
    .badge-tm-danger { background: #c62828; }
    .badge-issue { background: #c62828; animation: pulse-badge 1s infinite; }
    .badge-idle { background: #9e9e9e; }
    .badge-inicio { background: #1565c0; }
    .badge-fj { background: #6b21a8; }
    @keyframes pulse-badge { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    .op-detail { font-size: 13px; color: #555; line-height: 1.6; word-wrap: break-word; }
    .op-detail strong { color: #222; }
    /* Cuando hay box de premio (bad o good), reservar espacio derecho para que el wrap no quede oculto */
    .op-body:has(.op-bad-premio) .op-detail,
    .op-body:has(.op-good-premio) .op-detail { padding-right: calc(45% + 8px); }
    .timer { font-size: 20px; font-weight: 700; font-family: monospace; color: #2e7d32; }
    .timer-warn { color: #f57c00 !important; }
    .timer-danger { color: #c62828 !important; }

    .op-matriz { font-size: 12px; color: #888; margin-top: 4px; padding-top: 6px; border-top: 1px solid #eee; }

    .sin-actividad { text-align: center; padding: 20px; color: #999; font-size: 14px; }

    /* Estado del header segun tipo */
    .op-card.produccion .op-header { background: #e8f5e9; }
    .op-card.tm .op-header { background: #fff3e0; }
    .op-card.tm-danger .op-header { background: #ffcdd2; }
    .op-card.issue { border: 3px solid #c62828; animation: shake 0.5s ease-in-out; box-shadow: 0 0 16px rgba(198,40,40,0.3); }
    .op-card.issue .op-header { background: #c62828; color: #fff; }
    .op-card.issue .op-header .legajo { color: #ffcdd2; }
    .op-card.issue .op-detail { color: #b71c1c; }
    .op-card.issue .op-detail strong { color: #c62828; }
    .op-card.issue .op-matriz { color: #c62828; border-top-color: #ffcdd2; }
    .op-card.idle .op-header { background: #f5f5f5; }
    .op-card.inicio .op-header { background: #e3f2fd; }
    .op-card.fj .op-header { background: #f3e8ff; }
    .op-card.fj { opacity: 0.85; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

    /* Alertas */
    .alertas-wrap { display: flex; flex-direction: row; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
    .alerta { flex: 1 1 300px; }
    /* Alerta cajon puntaje<=-3 (rojo) y >=3 (verde) dentro de cada card */
    .op-body { position: relative; }
    .op-bad-premio, .op-good-premio {
      position: absolute; top: 12px; right: 12px;
      border-radius: 10px; padding: 9px 14px; font-size: 14px; max-width: 45%;
      cursor: pointer; user-select: none;
    }
    .op-bad-premio { background: #fee2e2; border: 2px solid #dc2626; animation: bp-pulse 1.5s infinite; }
    .op-bad-premio:hover { background: #fecaca; }
    .op-good-premio { background: #d1fae5; border: 2px solid #059669; animation: gp-pulse 1.5s infinite; }
    .op-good-premio:hover { background: #a7f3d0; }
    @keyframes bp-pulse { 0%, 100% { box-shadow: 0 0 0 rgba(220,38,38,0); } 50% { box-shadow: 0 0 8px rgba(220,38,38,0.6); } }
    @keyframes gp-pulse { 0%, 100% { box-shadow: 0 0 0 rgba(5,150,105,0); } 50% { box-shadow: 0 0 8px rgba(5,150,105,0.6); } }
    .op-bad-premio-titulo { font-weight: 800; color: #7f1d1d; font-size: 14px; margin-bottom: 4px; }
    .op-bad-premio-item { font-weight: 700; color: #c62828; line-height: 1.35; font-size: 14px; }
    .op-good-premio-titulo { font-weight: 800; color: #065f46; font-size: 14px; margin-bottom: 4px; }
    .op-good-premio-item { font-weight: 700; color: #059669; line-height: 1.35; font-size: 14px; }
    .alerta {
      background: #fff3cd; border: 2px solid #f59e0b; border-radius: 10px;
      padding: 12px 14px; display: flex; flex-direction: column; align-items: stretch;
    }
    .alerta.critica { background: #fee2e2; border-color: #dc2626; }
    .alerta-titulo {
      font-weight: 900; font-size: 22px; margin-bottom: 8px;
      color: #7c2d12; text-align: center;
    }
    .alerta.critica .alerta-titulo { color: #7f1d1d; }
    .alerta-ops { font-size: 16px; font-weight: 700; color: #222; text-align: center; }
    .alerta-close {
      position: absolute; top: 6px; right: 10px; border: none; background: transparent;
      font-size: 32px; font-weight: 700; color: #7c2d12; cursor: pointer; line-height: 1;
      padding: 0 6px;
    }
    .alerta-close:hover { color: #111; }
    .alerta { position: relative; }

    /* Popups */
    .popup-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      z-index: 200; display: none; pointer-events: none;
    }
    .popup-overlay.visible { display: block; pointer-events: auto; }
    .popup-box {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: #fff; border-radius: 16px; box-shadow: 0 16px 48px rgba(0,0,0,0.4);
      padding: 28px 36px; min-width: 360px; max-width: 42vw;
      border: 4px solid #dc2626; display: none; z-index: 201;
    }
    .popup-box.visible { display: block; }
    .popup-box.warning { border-color: #f59e0b; }
    .popup-box.left  { left: calc(50% - 20px); transform: translate(-100%, -50%); }
    .popup-box.right { left: calc(50% + 20px); transform: translateY(-50%); }
    .popup-box.center { left: 50%; transform: translate(-50%, -50%); }
    .popup-titulo {
      font-weight: 900; font-size: 28px; text-align: center; color: #7f1d1d;
      margin-bottom: 12px;
    }
    .popup-box.warning .popup-titulo { color: #7c2d12; }
    .popup-ops { font-size: 20px; font-weight: 700; text-align: center; color: #111; margin-bottom: 16px; }
    .popup-close {
      display: block; margin: 0 auto; padding: 10px 28px;
      background: #111; color: #fff; border: none; border-radius: 10px;
      font-weight: 700; font-size: 15px; cursor: pointer;
    }
    .popup-close:hover { opacity: 0.85; }

    /* Popup de registros del operario (mismo estilo que los otros popups) */
    .popup-box.regs {
      border-color: #1565c0; max-width: min(900px, 92vw); min-width: 480px;
      padding: 20px 24px; max-height: 86vh; display: none; flex-direction: column;
      left: 50%; transform: translate(-50%, -50%);
    }
    .popup-box.regs.visible { display: flex; }
    .popup-box.regs .popup-titulo { color: #0d47a1; margin-bottom: 4px; }
    .popup-box.regs .popup-subtitulo { text-align: center; font-size: 13px; color: #666; margin-bottom: 14px; }
    .regs-body { overflow: auto; flex: 1; border: 1px solid #e0e0e0; border-radius: 8px; }
    .regs-body table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .regs-body th {
      position: sticky; top: 0; background: #f5f5f5; padding: 10px 12px;
      text-align: left; font-weight: 700; border-bottom: 2px solid #ccc; color: #333;
    }
    .regs-body td { padding: 8px 12px; border-bottom: 1px solid #eee; vertical-align: top; }
    .regs-body tr:hover td { background: #fafafa; }
    .regs-body .op-tag {
      display: inline-block; padding: 2px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 700; color: #fff;
    }
    .regs-body .op-E { background: #1565c0; }
    .regs-body .op-C { background: #2e7d32; }
    .regs-body .op-TM { background: #f57c00; }
    .regs-body .op-ISSUE { background: #c62828; }
    .regs-body .op-OTHER { background: #616161; }
    .regs-empty { padding: 40px; text-align: center; color: #999; }
    .popup-box.regs .popup-close { margin-top: 14px; }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="../Inicio/" class="btn-back">&#8592; Volver</a>
    <h1>Monitor en Vivo <span class="live-dot"></span></h1>
    <span class="update-info" id="updateInfo"></span>
  </div>

  <div class="alertas-wrap" id="alertasWrap"></div>
  <div class="grid" id="grid"></div>

  <div class="popup-overlay" id="popupOverlay"></div>
  <div class="popup-box warning" id="popupPC">
    <div class="popup-titulo" id="popupPCTitulo"></div>
    <div class="popup-ops" id="popupPCOps"></div>
    <button class="popup-close" onclick="cerrarPopup('popupPC')">Cerrar</button>
  </div>
  <div class="popup-box" id="popupPB">
    <div class="popup-titulo" id="popupPBTitulo"></div>
    <div class="popup-ops" id="popupPBOps"></div>
    <button class="popup-close" onclick="cerrarPopup('popupPB')">Cerrar</button>
  </div>

  <div class="popup-box regs" id="popupRegs">
    <div class="popup-titulo" id="popupRegsTitulo"></div>
    <div class="popup-subtitulo" id="popupRegsSubtitulo"></div>
    <div class="regs-body" id="popupRegsBody"></div>
    <button class="popup-close" onclick="cerrarModalRegs()">Cerrar</button>
  </div>

<script>
(function() {
  'use strict';

  const SUPABASE_URL = 'https://hrxfctzncixxqmpfhskv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhyeGZjdHpuY2l4eHFtcGZoc2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjQyNjEsImV4cCI6MjA4ODMwMDI2MX0.4L6wguch8UZGhC2VpzrWcCjJGUV-IkYsl9JoCWrOLUs';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const grid = document.getElementById('grid');
  const alertasWrap = document.getElementById('alertasWrap');
  const updateInfo = document.getElementById('updateInfo');
  let pcLegajosHoy = new Set(); // legajos que tuvieron al menos 1 PC hoy

  // TM_CODES (codigos de Tiempo Muerto) y NON_DOWNTIME (Produccion) se cargan de
  // "Codificacion Mensajes".tipo. Fallback: NON_DOWNTIME={E,C}, TM_CODES vacio.
  // ISSUE_CODES eliminado (RM/PM/RD/REM ahora son TIEMPO_MUERTO en BD, no categoria aparte).
  let TM_CODES = new Set();
  let ISSUE_CODES = new Set(); // mantenido por compatibilidad — no se popula
  let NON_DOWNTIME = new Set(['E','C']);

  async function cargarTiposCodigos() {
    try {
      const { data, error } = await sb.from('Codificacion Mensajes').select('Codigo,tipo');
      if (error) throw error;
      const tm = new Set();
      const prod = new Set();
      (data || []).forEach(r => {
        const cod = String(r.Codigo || '').toUpperCase();
        if (r.tipo === 'TIEMPO_MUERTO') tm.add(cod);
        else if (r.tipo === 'PRODUCCION') prod.add(cod);
      });
      if (tm.size) TM_CODES = tm;
      if (prod.size) NON_DOWNTIME = prod;
    } catch (e) {
      console.error('[monitor] cargarTiposCodigos fallo, uso fallback:', e);
    }
  }

  let empleados = [];
  let matricesMap = {};
  let matrizTiempoHist = {}; // N_Matriz -> Tiempo_Historico (para calcular Premio en alerta)
  let badPremios = [];
  let goodPremios = [];
  let lastCajonByLegMat = {}; // "legajo|matNum" -> { Tiempo_Toma, Hora_Fin } (último cajón cerrado hoy)
  let sinSedeConActividad = []; // operarios sin Sede con mensajes hoy — para alerta

  // Dismiss persistente por dia. Key: legajo|matNum|horaFin (unico por cajon).
  // Si cierran un nuevo cajon malo (otro horaFin), el key cambia y reaparece.
  function bpKey(b) { return b.legajo + '|' + b.matNum + '|' + b.horaFin; }
  function bpDismissedKey() { return 'bpDismissed_' + todayKey(); }
  function bpGetDismissed() {
    try { return new Set(JSON.parse(localStorage.getItem(bpDismissedKey()) || '[]')); }
    catch { return new Set(); }
  }
  function bpAddDismissed(k) {
    const s = bpGetDismissed(); s.add(k);
    localStorage.setItem(bpDismissedKey(), JSON.stringify([...s]));
  }
  window.dismissBadPremios = function(ev, keysCsv) {
    ev.stopPropagation();
    keysCsv.split(',').forEach(k => k && bpAddDismissed(k));
    renderGrid();
  };
  // Idem para premios buenos (>=3)
  function gpDismissedKey() { return 'gpDismissed_' + todayKey(); }
  function gpGetDismissed() {
    try { return new Set(JSON.parse(localStorage.getItem(gpDismissedKey()) || '[]')); }
    catch { return new Set(); }
  }
  function gpAddDismissed(k) {
    const s = gpGetDismissed(); s.add(k);
    localStorage.setItem(gpDismissedKey(), JSON.stringify([...s]));
  }
  window.dismissGoodPremios = function(ev, keysCsv) {
    ev.stopPropagation();
    keysCsv.split(',').forEach(k => k && gpAddDismissed(k));
    renderGrid();
  };

  function esc(v) { return v == null ? '' : String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function formatTimer(seconds) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  async function init() {
    // Cargar empleados activos, matrices y tipos de codigos (TM/PRODUCCION)
    const [empRes, matRes] = await Promise.all([
      sb.from('Empleados').select('Legajo, Empleado, Activo, Sede').eq('Activo', 'SI'),
      sb.from('Matrices').select('N_Matriz, Matriz, Tiempo_Historico'),
      cargarTiposCodigos()
    ]);
    empleados = (empRes.data || []).sort((a, b) => {
      const la = String(a.Legajo).trim(), lb = String(b.Legajo).trim();
      // Legajo 1 (ficha de pruebas) siempre al final
      if (la === '1' && lb !== '1') return 1;
      if (lb === '1' && la !== '1') return -1;
      return parseInt(la.replace(/\D/g, '')) - parseInt(lb.replace(/\D/g, ''));
    });
    (matRes.data || []).forEach(m => {
      matricesMap[String(m.N_Matriz).trim()] = m.Matriz;
      matrizTiempoHist[String(m.N_Matriz).trim()] = m.Tiempo_Historico;
    });

    await refresh();
    // Auto-refresh cada 15 segundos
    setInterval(refresh, 15000);
    // Actualizar timers y alertas cada segundo
    setInterval(() => { updateTimers(); renderAlertas(); }, 1000);
  }

  let operarioStates = []; // Array de { legajo, nombre, type, action, desc, inicio, matriz, matrizNombre, elapsed }

  async function refresh() {
    const hoy = new Date().toISOString().slice(0, 10);

    // Traer todos los registros de hoy de Registros Produccion Cervantes
    const { data: registros } = await sb.from('Registros Produccion Cervantes')
      .select('legajo, opcion, descripcion, ts_event, hs_inicio, matriz, texto')
      .gte('ts_event', hoy + 'T00:00:00')
      .lte('ts_event', hoy + 'T23:59:59')
      .order('ts_event', { ascending: true });

    const regs = registros || [];

    // Cajones cerrados de hoy desde db_n8n_espejo (para detectar premios <= -3)
    const dia = new Date().getDate();
    const mes = new Date().getMonth() + 1;
    const { data: cajonesData } = await sb.from('db_n8n_espejo')
      .select('Legajo, Matriz, Uni, Tiempo_Toma, Hora_Fin, Eliminar')
      .eq('Dia', dia).eq('Mes', mes).gt('Uni', 0);
    const empNombreMap = {};
    empleados.forEach(e => { empNombreMap[String(e.Legajo).trim()] = e.Empleado; });
    badPremios = [];
    goodPremios = [];
    lastCajonByLegMat = {};
    (cajonesData || []).forEach(c => {
      if (c.Eliminar === 'S') return;
      const leg = String(c.Legajo).trim();
      if (leg === '1') return;
      const matNum = c.Matriz ? String(c.Matriz).trim() : null;
      if (!matNum) return;
      // Tracking ultimo cajon (max Hora_Fin) por leg+mat para mostrar en card
      const key = leg + '|' + matNum;
      const prev = lastCajonByLegMat[key];
      const hf = c.Hora_Fin || '';
      if (!prev || hf > prev.Hora_Fin) {
        lastCajonByLegMat[key] = { Tiempo_Toma: c.Tiempo_Toma, Hora_Fin: hf };
      }
      const tHist = matrizTiempoHist[matNum];
      if (!tHist || tHist <= 0 || !c.Tiempo_Toma || c.Tiempo_Toma <= 0) return;
      const premio = Math.round(((-(c.Tiempo_Toma / tHist) + 1) * 10) * 100) / 100;
      const item = {
        legajo: leg, nombre: empNombreMap[leg] || '?',
        matNum: matNum, matNombre: matricesMap[matNum] || '',
        premio: premio, horaFin: c.Hora_Fin || '',
        tHist: tHist, segUni: Number(c.Tiempo_Toma)
      };
      if (premio <= -3) badPremios.push(item);
      else if (premio >= 3) goodPremios.push(item);
    });
    badPremios.sort((a, b) => (b.horaFin || '').localeCompare(a.horaFin || ''));
    goodPremios.sort((a, b) => (b.horaFin || '').localeCompare(a.horaFin || ''));

    // Operarios que ya hicieron (o empezaron) al menos un PC hoy
    pcLegajosHoy = new Set();
    regs.forEach(r => { if (r.opcion === 'PC') pcLegajosHoy.add(String(r.legajo).trim()); });

    // Procesar estado actual de cada operario activo (solo Sede 'C')
    operarioStates = [];
    sinSedeConActividad = [];
    const now = new Date();

    empleados.forEach(emp => {
      const leg = String(emp.Legajo).trim();
      const empRegs = regs.filter(r => String(r.legajo).trim() === leg);
      const sede = String(emp.Sede || '').trim().toUpperCase();

      // Detectar operarios SIN sede con actividad hoy (para alertar)
      if (!sede && empRegs.length > 0 && leg !== '1') {
        sinSedeConActividad.push({ legajo: leg, nombre: emp.Empleado });
      }

      // Filtro: solo Sede 'C'
      if (sede !== 'C') return;

      if (empRegs.length === 0) {
        operarioStates.push({
          legajo: leg, nombre: emp.Empleado,
          type: 'idle', action: '-', desc: 'Sin actividad',
          inicio: null, matriz: null, matrizNombre: null, elapsed: 0
        });
        return;
      }

      // Reconstruir estado
      let currentMatriz = null;
      let currentMatrizNombre = null;
      let pendingTM = null; // { opcion, ts_event }
      let lastAction = null;
      let lastCajonAction = null; // ultima E o C: marca inicio del cajon en curso
      let fjEvent = null; // si hay FJ (Fin de Jornada), guarda el evento

      empRegs.forEach(r => {
        const op = r.opcion;

        // LT (Llegada Tarde) es un mensaje automatico cuando entran pasadas las 8:30 — no es TM real, ignorar
        if (op === 'LT') return;

        // FJ (Fin de Jornada) — no es TM, marcar al operario como cerrado
        if (op === 'FJ') {
          fjEvent = r;
          pendingTM = null; // cualquier TM abierto se cierra implicitamente con FJ
          return;
        }

        if (op === 'E') {
          currentMatriz = r.texto || r.matriz || null;
          currentMatrizNombre = currentMatriz ? (matricesMap[currentMatriz] || '') : '';
          lastAction = r;
          lastCajonAction = r;
        } else if (op === 'C') {
          // Normalizar descripcion a "Produciendo cajon" (igual que post-TM)
          lastAction = { ...r, descripcion: 'Produciendo cajon' };
          lastCajonAction = r; // C marca inicio del proximo cajon
        } else if (!NON_DOWNTIME.has(op)) {
          // TM toggle
          if (pendingTM && pendingTM.opcion === op) {
            pendingTM = null; // cerrado
            // Al cerrar TM: operario sigue en el mismo cajon.
            // Usar el ts_event del inicio del cajon (ultima E o C) para que
            // el "Inicio" mostrado sea el del cajon en curso, no el del TM.
            if (lastCajonAction) {
              lastAction = { ...lastCajonAction, opcion: 'C', descripcion: 'Produciendo cajon' };
            } else {
              lastAction = { ...r, opcion: 'C', descripcion: 'Produciendo cajon' };
            }
          } else if (!pendingTM) {
            pendingTM = r; // abrir
          }
          // Si era otro TM distinto, se ignora (no deberia pasar)
        } else {
          lastAction = r;
        }
      });

      // Determinar estado actual
      if (fjEvent) {
        // Operario cerró su jornada — estado especial
        const ts = new Date(fjEvent.ts_event);
        const elapsed = (now - ts) / 1000;
        operarioStates.push({
          legajo: leg, nombre: emp.Empleado,
          type: 'fj',
          action: 'FJ', desc: 'Fin de Jornada',
          inicio: fjEvent.ts_event,
          matriz: currentMatriz, matrizNombre: currentMatrizNombre,
          elapsed: elapsed
        });
      } else if (pendingTM) {
        // TM abierto
        const ts = new Date(pendingTM.ts_event);
        const elapsed = (now - ts) / 1000;
        const isTM = TM_CODES.has(pendingTM.opcion);
        const isIssue = ISSUE_CODES.has(pendingTM.opcion);
        operarioStates.push({
          legajo: leg, nombre: emp.Empleado,
          type: isIssue ? 'issue' : 'tm',
          action: pendingTM.opcion, desc: pendingTM.descripcion,
          inicio: pendingTM.ts_event,
          matriz: currentMatriz, matrizNombre: currentMatrizNombre,
          elapsed: elapsed
        });
      } else if (lastAction) {
        // Ultima accion completada
        const op = lastAction.opcion;
        const ts = new Date(lastAction.ts_event);
        const elapsed = (now - ts) / 1000;
        let type = 'produccion';
        if (op === 'E') type = 'inicio';
        else if (op === 'C') type = 'produccion';

        operarioStates.push({
          legajo: leg, nombre: emp.Empleado,
          type: type,
          action: op, desc: lastAction.descripcion,
          inicio: lastAction.ts_event,
          matriz: currentMatriz, matrizNombre: currentMatrizNombre,
          elapsed: elapsed
        });
      }
    });

    renderGrid();
    renderAlertas();
    updateInfo.textContent = 'Actualizado: ' + now.toLocaleTimeString('es-AR');
  }

  function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function updatePopupPositions() {
    const pcVisible = document.getElementById('popupPC').classList.contains('visible');
    const pbVisible = document.getElementById('popupPB').classList.contains('visible');
    const overlay = document.getElementById('popupOverlay');
    overlay.classList.toggle('visible', pcVisible || pbVisible);
    const pc = document.getElementById('popupPC');
    const pb = document.getElementById('popupPB');
    pc.classList.remove('left','right','center');
    pb.classList.remove('left','right','center');
    if (pcVisible && pbVisible) { pc.classList.add('left'); pb.classList.add('right'); }
    else if (pcVisible) pc.classList.add('center');
    else if (pbVisible) pb.classList.add('center');
  }

  window.cerrarPopup = function(id) {
    document.getElementById(id).classList.remove('visible');
    updatePopupPositions();
  };

  window.cerrarBannerPC = function() {
    localStorage.setItem('bannerPCDismissed_' + todayKey(), '1');
    renderAlertas();
  };

  function mostrarPopupPC(titulo, detalle) {
    document.getElementById('popupPCTitulo').innerHTML = titulo;
    document.getElementById('popupPCOps').innerHTML = detalle;
    document.getElementById('popupPC').classList.add('visible');
    updatePopupPositions();
  }
  function mostrarPopupPB(titulo, detalle) {
    document.getElementById('popupPBTitulo').innerHTML = titulo;
    document.getElementById('popupPBOps').innerHTML = detalle;
    document.getElementById('popupPB').classList.add('visible');
    updatePopupPositions();
  }

  function renderAlertas() {
    const alertas = [];
    const now = new Date();

    // Bad premios se renderizan dentro de cada card (renderGrid los inyecta).
    // Operarios que estan trabajando hoy: type != 'idle' (ya enviaron algun msg) y no es legajo 1 (ficha de prueba)
    const operariosHoy = operarioStates.filter(op => op.type !== 'idle' && String(op.legajo).trim() !== '1');

    // Alerta 1: operarios en cualquier tiempo muerto por más de 10 minutos
    // Exceptuados: PC (Pare Comida) y LT (Llegada Tarde — automático cuando entran pasadas las 8:30)
    const TM_EXCLUIDOS_ALERTA = new Set(['PC', 'LT']);
    const tmLargo = operariosHoy
      .filter(op => op.type === 'tm' && op.inicio && !TM_EXCLUIDOS_ALERTA.has(op.action))
      .map(op => ({ ...op, elapsedNow: (now - new Date(op.inicio).getTime()) / 1000 }))
      .filter(op => op.elapsedNow > 10 * 60);
    if (tmLargo.length) {
      const lista = tmLargo.map(op => esc(op.nombre) + ' (' + esc(op.desc || op.action) + ', ' + Math.floor(op.elapsedNow / 60) + 'min)').join(', ');
      alertas.push({ critica: true, icon: '⚠', titulo: 'Tiempo Muerto > 10 min', detalle: lista });
    }

    // Alerta: operarios con mensajes hoy pero sin Sede asignada (probablemente falta marcarlos como C)
    if (sinSedeConActividad && sinSedeConActividad.length) {
      const lista = sinSedeConActividad.map(o => esc(o.nombre) + ' (#' + esc(o.legajo) + ')').join(', ');
      alertas.push({ critica: true, icon: '🏷', titulo: 'Operarios sin Sede asignada con actividad hoy', detalle: lista });
    }

    // Alerta 2: operarios que aún no empezaron PC (Para Comida) a las 12:05
    const hora1205 = new Date();
    hora1205.setHours(12, 5, 0, 0);
    if (now >= hora1205) {
      const sinPC = operariosHoy.filter(op => !pcLegajosHoy.has(op.legajo));
      if (sinPC.length && !localStorage.getItem('bannerPCDismissed_' + todayKey())) {
        const lista = sinPC.map(op => esc(op.nombre)).join(', ');
        alertas.push({ critica: false, icon: '🍴', titulo: 'Sin Pare Comida después de las 12:05', detalle: lista, cerrable: true, id: 'bannerPC' });
        // Popup: 1 sola vez por dia, persistente aun despues de reload
        const tKey = todayKey();
        if (!localStorage.getItem('popupPC_' + tKey)) {
          mostrarPopupPC('🍴 Sin Pare Comida', lista);
          localStorage.setItem('popupPC_' + tKey, '1');
        }
      }
    }

    if (!alertas.length) { alertasWrap.innerHTML = ''; return; }
    alertasWrap.innerHTML = alertas.map(a => {
      const btnCerrar = a.cerrable ? '<button class="alerta-close" onclick="cerrarBannerPC()">&times;</button>' : '';
      return '<div class="alerta' + (a.critica ? ' critica' : '') + '">' +
        btnCerrar +
        '<div class="alerta-titulo">' + a.icon + ' ' + esc(a.titulo) + '</div>' +
        '<div class="alerta-ops">' + a.detalle + '</div>' +
      '</div>';
    }).join('');
  }

  function renderGrid() {
    // Ordenar: TM/Issues primero, luego produccion, luego idle
    const order = { issue: 0, tm: 1, inicio: 2, produccion: 3, fj: 4, idle: 5 };
    const sorted = [...operarioStates].sort((a, b) => (order[a.type] || 9) - (order[b.type] || 9));

    // Map legajo -> ULTIMO bad premio (sin importar dismiss). Luego filtramos si está dismisseado.
    // Asi si dismisseas el ultimo, no aparece uno viejo. Solo reaparece cuando hay UN cajon nuevo malo.
    const dismissedSet = bpGetDismissed();
    const ultimoPorLegajo = {};
    (badPremios || []).forEach(b => {
      if (ultimoPorLegajo[b.legajo]) return; // badPremios ordenado desc
      ultimoPorLegajo[b.legajo] = b;
    });
    const badByLegajo = {};
    Object.entries(ultimoPorLegajo).forEach(([leg, b]) => {
      if (dismissedSet.has(bpKey(b))) return;
      badByLegajo[leg] = [b];
    });

    // Idem good premios (>=3)
    const dismissedSetG = gpGetDismissed();
    const ultimoGoodPorLegajo = {};
    (goodPremios || []).forEach(b => {
      if (ultimoGoodPorLegajo[b.legajo]) return;
      ultimoGoodPorLegajo[b.legajo] = b;
    });
    const goodByLegajo = {};
    Object.entries(ultimoGoodPorLegajo).forEach(([leg, b]) => {
      if (dismissedSetG.has(bpKey(b))) return;
      goodByLegajo[leg] = [b];
    });

    grid.innerHTML = sorted.map(op => {
      // TM: naranja 0-10min, rojo >10min
      let cardType = op.type;
      let badgeClass, badgeText;
      if (op.type === 'tm') {
        const isDanger = op.elapsed > 600; // >10 min
        cardType = isDanger ? 'tm-danger' : 'tm';
        badgeClass = isDanger ? 'badge-tm-danger' : 'badge-tm';
        badgeText = 'Tiempo Muerto';
      } else if (op.type === 'issue') {
        badgeClass = 'badge-issue';
        badgeText = 'PROBLEMA';
      } else if (op.type === 'produccion') {
        badgeClass = 'badge-produccion';
        badgeText = 'Produciendo';
      } else if (op.type === 'inicio') {
        badgeClass = 'badge-inicio';
        badgeText = 'Inicio Matriz';
      } else if (op.type === 'fj') {
        badgeClass = 'badge-fj';
        badgeText = 'Fin de Jornada';
      } else {
        badgeClass = 'badge-idle';
        badgeText = 'Sin actividad';
      }

      // Timer color: TM naranja->rojo, issue siempre rojo, produccion verde
      let timerClass = '';
      if (op.type === 'tm') {
        timerClass = op.elapsed > 600 ? 'timer-danger' : 'timer-warn';
      } else if (op.type === 'issue') {
        timerClass = 'timer-danger';
      }

      let detail = '';
      if (op.type !== 'idle') {
        const horaIni = op.inicio ? new Date(op.inicio).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '-';
        const matInline = op.matriz
          ? ` <strong style="color:#222;">· Mat ${esc(op.matriz)}${op.matrizNombre ? ' - ' + esc(op.matrizNombre) : ''}</strong>`
          : '';
        // T.Hist y Seg/Uni del ultimo cajon cerrado para la matriz activa
        let thSegLine = '';
        if (op.matriz) {
          const tHist = matrizTiempoHist[op.matriz];
          const lastC = lastCajonByLegMat[op.legajo + '|' + op.matriz];
          const segUni = lastC && lastC.Tiempo_Toma > 0 ? Number(lastC.Tiempo_Toma) : null;
          const partes = [];
          if (tHist > 0) partes.push('T.Hist: <strong style="color:#222;">' + Number(tHist).toFixed(2) + '</strong>');
          if (segUni != null) partes.push('Seg/Uni: <strong style="color:#222;">' + segUni.toFixed(2) + '</strong>');
          if (partes.length) thSegLine = '<div style="font-size:15px;color:#444;margin-top:6px;font-weight:600;">' + partes.join(' · ') + '</div>';
        }
        if (op.type === 'fj') {
          // Sin timer — es estado final, mostrar solo hora
          detail = `
            <div class="op-detail">
              <strong>${esc(op.action)}</strong> - ${esc(op.desc)}<br>
              Terminó: <strong>${horaIni}</strong>
            </div>`;
        } else {
          detail = `
            <div class="op-detail">
              <strong>${esc(op.action)}</strong> - ${esc(op.desc)}${matInline}<br>
              Inicio: <strong>${horaIni}</strong>
              <span class="timer ${timerClass}" data-inicio="${op.inicio || ''}" data-type="${op.type}">${formatTimer(op.elapsed)}</span>
              ${thSegLine}
            </div>`;
        }
      }
      const matrizInfo = ''; // ahora va inline en detail (arriba)

      // Inyectar alerta bad-premio dentro de la card (solo cajones de hoy con premio<=-3)
      // Click en el box = dismiss persistente (por dia). Si cierra otro cajon malo, reaparece.
      let badPremioBox = '';
      const malos = badByLegajo[op.legajo] || [];
      const buenos = goodByLegajo[op.legajo] || [];
      const itemHtml = (b, sign) => {
        const meta = (b.tHist > 0 || b.segUni > 0)
          ? '<div style="font-size:11px;font-weight:600;line-height:1.2;">T.Hist: ' + (b.tHist > 0 ? Number(b.tHist).toFixed(2) : '-') + ' · Seg/Uni: ' + (b.segUni > 0 ? Number(b.segUni).toFixed(2) : '-') + '</div>'
          : '';
        return 'Mat ' + esc(b.matNum) + ': <span style="font-size:16px;">' + sign + b.premio.toFixed(1) + '</span>' + meta;
      };
      if (malos.length) {
        const items = malos.map(b => itemHtml(b, '')).join('<br>');
        const keys = malos.map(bpKey).join(',');
        badPremioBox = '<div class="op-bad-premio" title="Click para sacar" onclick="dismissBadPremios(event, \'' + esc(keys) + '\')">' +
          '<div class="op-bad-premio-titulo">⚠ Pje ≤ -3</div>' +
          '<div class="op-bad-premio-item">' + items + '</div>' +
        '</div>';
      } else if (buenos.length) {
        // Solo mostrar verde si NO hay rojo (prioridad al malo si coexisten)
        const items = buenos.map(b => itemHtml(b, '+')).join('<br>');
        const keys = buenos.map(bpKey).join(',');
        badPremioBox = '<div class="op-good-premio" title="Click para sacar" onclick="dismissGoodPremios(event, \'' + esc(keys) + '\')">' +
          '<div class="op-good-premio-titulo">⭐ Pje ≥ 3</div>' +
          '<div class="op-good-premio-item">' + items + '</div>' +
        '</div>';
      }

      return `
        <div class="op-card ${cardType}" data-legajo="${esc(op.legajo)}" data-nombre="${esc(op.nombre)}" onclick="abrirModalRegs('${esc(op.legajo)}', '${esc(op.nombre)}')">
          <div class="op-header">
            <span>${esc(op.nombre)} <span class="legajo">#${esc(op.legajo)}</span></span>
            <span class="status-badge ${badgeClass}">${badgeText}</span>
          </div>
          <div class="op-body">
            ${badPremioBox}
            ${op.type === 'idle' ? '<div class="sin-actividad">Sin actividad registrada hoy</div>' : ''}
            ${detail}
            ${matrizInfo}
          </div>
        </div>`;
    }).join('');
  }

  window.abrirModalRegs = async function(legajo, nombre) {
    const box = document.getElementById('popupRegs');
    const body = document.getElementById('popupRegsBody');
    const overlay = document.getElementById('popupOverlay');
    document.getElementById('popupRegsTitulo').textContent = esc(nombre);
    document.getElementById('popupRegsSubtitulo').textContent = 'Legajo #' + legajo + ' - Registros del día';
    body.innerHTML = '<div class="regs-empty">Cargando...</div>';
    box.classList.add('visible');
    overlay.classList.add('visible');

    const hoy = new Date().toISOString().slice(0, 10);
    const { data, error } = await sb.from('Registros Produccion Cervantes')
      .select('legajo, opcion, descripcion, ts_event, hs_inicio, matriz, texto')
      .eq('legajo', legajo)
      .gte('ts_event', hoy + 'T00:00:00')
      .lte('ts_event', hoy + 'T23:59:59')
      .order('ts_event', { ascending: false });

    if (error) {
      body.innerHTML = '<div class="regs-empty">Error: ' + esc(error.message) + '</div>';
      return;
    }
    const regs = data || [];
    if (!regs.length) {
      body.innerHTML = '<div class="regs-empty">Sin registros para hoy.</div>';
      return;
    }

    const tagClass = (op) => {
      if (op === 'E') return 'op-E';
      if (op === 'C') return 'op-C';
      if (ISSUE_CODES.has(op)) return 'op-ISSUE';
      if (TM_CODES.has(op)) return 'op-TM';
      return 'op-OTHER';
    };

    const rows = regs.map(r => {
      const hora = r.ts_event ? new Date(r.ts_event).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '-';
      const matrizNombre = r.matriz ? (matricesMap[String(r.matriz).trim()] || '') : '';
      const matrizCell = r.matriz ? (esc(r.matriz) + (matrizNombre ? ' - ' + esc(matrizNombre) : '')) : '';
      return `<tr>
        <td>${hora}</td>
        <td><span class="op-tag ${tagClass(r.opcion)}">${esc(r.opcion)}</span></td>
        <td>${esc(r.descripcion)}</td>
        <td>${matrizCell}</td>
        <td>${esc(r.texto)}</td>
      </tr>`;
    }).join('');

    body.innerHTML = `
      <table>
        <thead>
          <tr>
            <th style="width:90px">Hora</th>
            <th style="width:70px">Opción</th>
            <th>Descripción</th>
            <th>Matriz</th>
            <th>Texto</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  };

  window.cerrarModalRegs = function() {
    document.getElementById('popupRegs').classList.remove('visible');
    // Si no hay otros popups abiertos, cerrar overlay
    const pc = document.getElementById('popupPC').classList.contains('visible');
    const pb = document.getElementById('popupPB').classList.contains('visible');
    if (!pc && !pb) document.getElementById('popupOverlay').classList.remove('visible');
  };

  function updateTimers() {
    const now = Date.now();
    document.querySelectorAll('.timer[data-inicio]').forEach(el => {
      const inicio = el.dataset.inicio;
      if (!inicio) return;
      const elapsed = (now - new Date(inicio).getTime()) / 1000;
      el.textContent = formatTimer(elapsed);
      const type = el.dataset.type;

      el.classList.remove('timer-warn', 'timer-danger');
      if (type === 'issue') {
        el.classList.add('timer-danger');
      } else if (type === 'tm') {
        // TM: naranja 0-10min, rojo >10min
        el.classList.add(elapsed > 600 ? 'timer-danger' : 'timer-warn');
        // Actualizar tarjeta tambien
        const card = el.closest('.op-card');
        if (card) {
          card.classList.remove('tm', 'tm-danger');
          card.classList.add(elapsed > 600 ? 'tm-danger' : 'tm');
          const badge = card.querySelector('.status-badge');
          if (badge) {
            badge.classList.remove('badge-tm', 'badge-tm-danger');
            badge.classList.add(elapsed > 600 ? 'badge-tm-danger' : 'badge-tm');
          }
        }
      }
    });
  }

  init();
})();
</script>
