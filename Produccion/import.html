<!DOCTYPE html>
<html lang="es">
<head>
  <script src="../auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Importar CSV - Produccion</title>
  <link rel="icon" href="data:," />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', Arial, sans-serif; background: #f0f0f4; padding: 16px; color: #222; font-size: 14px; }

    .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .btn-back { background: #f5f5f5; border: 2px solid #ccc; border-radius: 999px; padding: 7px 16px; font-size: 13px; color: #555; cursor: pointer; text-decoration: none; font-weight: 600; }
    .btn-back:hover { border-color: #888; }
    .top-bar h1 { font-size: 20px; }

    .card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 18px; margin-bottom: 16px; }

    .input-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; color: #666; font-weight: 600; }
    .field input[type="number"] { border: 1px solid #ccc; border-radius: 6px; padding: 7px 10px; font-size: 14px; width: 90px; }
    .field input[type="file"] { font-size: 13px; }

    textarea.csv-paste { width: 100%; height: 120px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 12px; resize: vertical; margin-top: 10px; }

    .sep { color: #bbb; font-size: 13px; margin: 8px 0 4px; }

    .btn { border: none; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #1976d2; color: #fff; }
    .btn-success { background: #2e7d32; color: #fff; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }

    .summary { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .sum-card { border-radius: 8px; padding: 10px 16px; font-size: 13px; }
    .sum-card .num { font-size: 22px; font-weight: 700; }
    .sum-card .lbl { font-size: 11px; margin-top: 2px; }
    .s-total   { background: #e3f2fd; color: #1565c0; }
    .s-ok      { background: #e8f5e9; color: #1b5e20; }
    .s-dupcsv  { background: #fff3e0; color: #e65100; }
    .s-endb    { background: #fce4ec; color: #880e4f; }
    .s-inv     { background: #f5f5f5; color: #757575; }

    .table-wrap { overflow-x: auto; max-height: 55vh; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { position: sticky; top: 0; background: #f5f5f5; padding: 8px 10px; text-align: left; font-weight: 700; white-space: nowrap; border-bottom: 2px solid #ddd; z-index: 1; }
    tbody td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
    tbody tr.ok      { background: #f0fff0; }
    tbody tr.dup_csv { background: #fff8f0; }
    tbody tr.en_db   { background: #fff0f5; }
    tbody tr.inv     { background: #fafafa; color: #aaa; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    .badge-ok     { background: #c8e6c9; color: #1b5e20; }
    .badge-dupcsv { background: #ffe0b2; color: #e65100; }
    .badge-endb   { background: #f8bbd0; color: #880e4f; }
    .badge-inv    { background: #eeeeee; color: #757575; }

    .actions { display: flex; gap: 12px; align-items: center; margin-top: 14px; }
    .progress-wrap { margin-top: 12px; display: none; }
    .progress-bar-bg { background: #e0e0e0; border-radius: 4px; height: 8px; }
    .progress-bar { background: #2e7d32; height: 8px; border-radius: 4px; transition: width 0.3s; }
    .progress-text { font-size: 12px; color: #555; margin-top: 4px; }

    .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 12px; display: none; }
    .msg-ok    { background: #e8f5e9; color: #1b5e20; border: 1px solid #a5d6a7; }
    .msg-err   { background: #ffebee; color: #b71c1c; border: 1px solid #ef9a9a; }
    .msg-info  { background: #e3f2fd; color: #0d47a1; border: 1px solid #90caf9; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="../Inicio/" class="btn-back">&#8592; Volver</a>
  <h1>Importar CSV — Produccion</h1>
</div>

<div class="card">
  <div class="input-row">
    <div class="field">
      <label>Año del CSV</label>
      <input type="number" id="yearInput" value="" min="2020" max="2099" style="width:80px" />
    </div>
    <div class="field">
      <label>Archivo CSV</label>
      <input type="file" id="fileInput" accept=".csv,.txt" />
    </div>
    <button class="btn btn-primary" id="btnAnalizar" disabled>Analizar</button>
  </div>
  <div class="sep">— o pegá el texto del CSV directamente —</div>
  <textarea class="csv-paste" id="csvPaste" placeholder="Pegá el contenido del CSV acá (separado por punto y coma)..."></textarea>
</div>

<div class="card" id="resultCard" style="display:none">
  <div class="summary" id="summary"></div>
  <div class="table-wrap">
    <table id="previewTable">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Legajo</th>
          <th>Matriz</th>
          <th>Nombre</th>
          <th>Ini</th>
          <th>Fin</th>
          <th>UNI</th>
          <th>Premio</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="previewBody"></tbody>
    </table>
  </div>
  <div class="actions">
    <button class="btn btn-success" id="btnImportar" disabled>Importar</button>
    <span id="importLabel" style="font-size:13px; color:#555;"></span>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>
  <div class="msg" id="msgBox"></div>
</div>

<script>
(function () {
  'use strict';

  const SUPABASE_URL = 'https://hrxfctzncixxqmpfhskv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhyeGZjdHpuY2l4eHFtcGZoc2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjQyNjEsImV4cCI6MjA4ODMwMDI2MX0.4L6wguch8UZGhC2VpzrWcCjJGUV-IkYsl9JoCWrOLUs';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const MONTHS = { ene:1,feb:2,mar:3,abr:4,may:5,jun:6,jul:7,ago:8,sep:9,oct:10,nov:11,dic:12 };

  // TM_MATRICES se carga de "Codificacion Mensajes" tipo='TIEMPO_MUERTO'.
  // Fallback hardcoded preservado por si la BD falla (no incluye 'MOV P' que era typo).
  let TM_MATRICES = new Set(['LIMP','MOV','BC','PB','AL','PR','PC','CM','LT']);

  async function cargarTMMatrices(){
    try {
      const { data, error } = await sb.from("Codificacion Mensajes").select("Codigo").eq("tipo", "TIEMPO_MUERTO");
      if (error) { console.warn("[import] No se pudo cargar TM_MATRICES, uso fallback:", error.message); return; }
      if (data && data.length) TM_MATRICES = new Set(data.map(r => String(r.Codigo).toUpperCase().trim()));
    } catch (e) { console.warn("[import] cargarTMMatrices fallo, uso fallback:", e); }
  }
  cargarTMMatrices();

  const yearInput   = document.getElementById('yearInput');
  const fileInput   = document.getElementById('fileInput');
  const csvPaste    = document.getElementById('csvPaste');
  const btnAnalizar = document.getElementById('btnAnalizar');
  const resultCard  = document.getElementById('resultCard');
  const summaryEl   = document.getElementById('summary');
  const previewBody = document.getElementById('previewBody');
  const btnImportar = document.getElementById('btnImportar');
  const importLabel = document.getElementById('importLabel');
  const progressWrap= document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  const progressText= document.getElementById('progressText');
  const msgBox      = document.getElementById('msgBox');

  yearInput.value = new Date().getFullYear();

  let parsedRows = [];

  // ─── Habilitacion boton Analizar ─────────────────────────────────────────
  function checkReady() {
    const hasContent = csvPaste.value.trim().length > 10 || fileInput.files.length > 0;
    btnAnalizar.disabled = !hasContent;
  }
  csvPaste.addEventListener('input', checkReady);
  fileInput.addEventListener('change', checkReady);

  // ─── Helpers de parseo ────────────────────────────────────────────────────
  function parseFecha(str, year) {
    const p = str.trim().split('-');
    if (p.length !== 2) return null;
    const day = parseInt(p[0]);
    const mon = MONTHS[p[1].toLowerCase()];
    if (!day || !mon) return null;
    return `${year}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  }

  function parseHora(hhmm) {
    const s = String(hhmm || '').trim();
    if (!s || s === '-') return null;
    const n = parseInt(s);
    if (isNaN(n)) return null;
    const h = Math.floor(n / 100);
    const m = n % 100;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00`;
  }

  function parseNum(s) {
    if (!s) return 0;
    const t = s.toString().replace(/,/g,'').replace(/\s/g,'');
    if (t === '-' || t === '') return 0;
    return parseFloat(t) || 0;
  }

  function getNombreMatriz(matriz, col12) {
    const m = String(matriz || '').trim().toUpperCase();
    if (m === 'LIMP') return 'Limpieza';
    if (m === 'MOV')  return 'Movimiento';
    return (col12 || '').trim();
  }

  function rowKey(legajo, fecha, hi, hf) {
    return `${legajo}|${fecha}|${hi}|${hf}`;
  }

  // ─── Parseo CSV ───────────────────────────────────────────────────────────
  function parseCSV(text, year) {
    const lines = text.split(/\r?\n/);
    const rows = [];
    let headerSkipped = false;

    for (const line of lines) {
      const raw = line.trim();
      if (!raw) continue;

      const cols = raw.split(';');
      // Detectar header
      if (!headerSkipped && (cols[0].trim().toLowerCase().startsWith('fecha') || cols[0].trim() === '')) {
        headerSkipped = true;
        continue;
      }

      const fechaStr = (cols[0] || '').trim();
      const legajo   = (cols[1] || '').trim();
      const matrizRaw= (cols[2] || '').trim();
      const horaIniRaw = (cols[3] || '').trim();
      const horaFinRaw = (cols[4] || '').trim();
      const uniRaw   = (cols[5] || '').trim();
      const tToma    = parseNum(cols[6]);
      const tHist    = parseNum(cols[7]);
      const premioRaw= (cols[8] || '').trim();
      const empleado = (cols[9] || '').trim();
      const anular   = (cols[10] || '').trim() === 'X';
      const nombreMat= getNombreMatriz(matrizRaw, cols[12]);
      const segHist  = (cols[15] || '').trim();
      const segTrab  = (cols[16] || '').trim();
      const diaRaw   = (cols[19] || '').trim();
      const mesRaw   = (cols[20] || '').trim();
      const quinRaw  = (cols[21] || '').trim();

      // Filtrar filas invalidas
      if (!legajo || !fechaStr || !matrizRaw) continue;
      if (diaRaw === '' || diaRaw.includes('VALOR') || diaRaw.includes('#')) continue;
      const dia = parseInt(diaRaw);
      const mes = parseInt(mesRaw);
      const qui = parseInt(quinRaw);
      if (!dia || !mes) continue;

      const fecha = parseFecha(fechaStr, year);
      if (!fecha) continue;

      const horaIni = parseHora(horaIniRaw);
      const horaFin = parseHora(horaFinRaw);
      if (!horaIni || !horaFin) continue;

      const uni    = parseNum(uniRaw);
      const premio = parseNum(premioRaw);

      const matrizUpper = matrizRaw.toUpperCase();
      const isTM = TM_MATRICES.has(matrizUpper);

      const segHistNum = parseNum(segHist);
      const segTrabNum = parseNum(segTrab);
      const segTM = isTM ? String(segTrabNum) : '0';

      rows.push({
        _raw: fechaStr + ' ' + matrizRaw + ' ' + horaIniRaw,
        fechaDisplay: fechaStr,
        legajo,
        matriz: matrizRaw,
        nombreMatriz: nombreMat || matrizRaw,
        fecha,
        horaInicio: horaIni,
        horaFin: horaFin,
        uni,
        premio,
        tiempoToma: tToma,
        tiempoHistorico: tHist,
        nombreEmpleado: empleado,
        anularTiempo: anular,
        segundosHistorico: String(segHistNum),
        segundosTrabajados: String(segTrabNum),
        segundosTiempoMuerto: segTM,
        dia, mes, quincena: qui || (dia <= 15 ? 1 : 2),
        status: 'ok'
      });
    }
    return rows;
  }

  // ─── Duplicados internos ──────────────────────────────────────────────────
  function detectInternalDups(rows) {
    const seen = new Map(); // key → first index with this key
    rows.forEach((row, i) => {
      if (row.status !== 'ok') return;
      const k = rowKey(row.legajo, row.fecha, row.horaInicio, row.horaFin);
      if (seen.has(k)) {
        row.status = 'dup_csv';
      } else {
        seen.set(k, i);
      }
    });
  }

  // ─── Check contra Supabase ────────────────────────────────────────────────
  async function checkDB(rows) {
    const okRows = rows.filter(r => r.status === 'ok');
    if (!okRows.length) return;

    const legajos = [...new Set(okRows.map(r => r.legajo))];
    const fechas  = okRows.map(r => r.fecha).sort();
    const minF    = fechas[0] + 'T00:00:00';
    const maxF    = fechas[fechas.length - 1] + 'T23:59:59';

    showMsg('info', 'Consultando Supabase para detectar duplicados...');

    const { data, error } = await sb
      .from('db_n8n_espejo')
      .select('"Legajo","Fecha","Hora_Inicio","Hora_Fin"')
      .in('Legajo', legajos)
      .gte('Fecha', minF)
      .lte('Fecha', maxF);

    if (error) {
      showMsg('err', 'Error al consultar DB: ' + error.message);
      return;
    }

    const dbKeys = new Set((data || []).map(r =>
      rowKey(r.Legajo, (r.Fecha || '').slice(0, 10), r.Hora_Inicio, r.Hora_Fin)
    ));

    rows.forEach(row => {
      if (row.status !== 'ok') return;
      const k = rowKey(row.legajo, row.fecha, row.horaInicio, row.horaFin);
      if (dbKeys.has(k)) row.status = 'en_db';
    });
  }

  // ─── Render tabla ─────────────────────────────────────────────────────────
  function renderTable(rows) {
    const counts = { ok:0, dup_csv:0, en_db:0, inv:0 };
    rows.forEach(r => { counts[r.status] = (counts[r.status] || 0) + 1; });

    summaryEl.innerHTML = `
      <div class="sum-card s-total"><div class="num">${rows.length}</div><div class="lbl">Total</div></div>
      <div class="sum-card s-ok"><div class="num">${counts.ok}</div><div class="lbl">A importar</div></div>
      <div class="sum-card s-dupcsv"><div class="num">${counts.dup_csv}</div><div class="lbl">Dup en CSV</div></div>
      <div class="sum-card s-endb"><div class="num">${counts.en_db}</div><div class="lbl">Ya en DB</div></div>
    `;

    const badges = {
      ok:      '<span class="badge badge-ok">✓ OK</span>',
      dup_csv: '<span class="badge badge-dupcsv">⚠ Dup CSV</span>',
      en_db:   '<span class="badge badge-endb">✗ Ya en DB</span>',
      inv:     '<span class="badge badge-inv">— Inválida</span>',
    };

    previewBody.innerHTML = rows.map(r => `
      <tr class="${r.status === 'en_db' ? 'en_db' : r.status === 'dup_csv' ? 'dup_csv' : r.status === 'ok' ? 'ok' : 'inv'}">
        <td>${esc(r.fechaDisplay)}</td>
        <td>${esc(r.legajo)}</td>
        <td>${esc(r.matriz)}</td>
        <td>${esc(r.nombreMatriz)}</td>
        <td>${r.horaInicio ? r.horaInicio.slice(0,5) : '-'}</td>
        <td>${r.horaFin   ? r.horaFin.slice(0,5)   : '-'}</td>
        <td>${r.uni || '-'}</td>
        <td>${r.status !== 'ok' && r.status !== 'dup_csv' && r.status !== 'en_db' ? '' : (r.premio > 0 ? '+' : '') + r.premio}</td>
        <td>${badges[r.status] || ''}</td>
      </tr>
    `).join('');

    const toImport = counts.ok;
    btnImportar.disabled = toImport === 0;
    importLabel.textContent = toImport > 0
      ? `${toImport} fila${toImport !== 1 ? 's' : ''} listas para importar`
      : 'No hay filas nuevas para importar';
    btnImportar.textContent = `Importar ${toImport} fila${toImport !== 1 ? 's' : ''}`;

    resultCard.style.display = '';
    hideMsg();
  }

  // ─── Importar ─────────────────────────────────────────────────────────────
  async function importRows() {
    const toInsert = parsedRows.filter(r => r.status === 'ok');
    if (!toInsert.length) return;

    btnImportar.disabled = true;
    btnAnalizar.disabled = true;
    progressWrap.style.display = '';
    hideMsg();

    const BATCH = 50;
    let done = 0;
    let errors = 0;

    for (let i = 0; i < toInsert.length; i += BATCH) {
      const chunk = toInsert.slice(i, i + BATCH);
      const payload = chunk.map(r => ({
        Fecha:                  r.fecha + 'T00:00:00+00:00',
        Legajo:                 r.legajo,
        Nombre_Matriz:          r.nombreMatriz,
        Matriz:                 r.matriz,
        Uni:                    r.uni,
        Premio:                 r.premio,
        Tiempo_Toma:            r.tiempoToma,
        Tiempo_Historico:       r.tiempoHistorico,
        Nombre_Empleado:        r.nombreEmpleado,
        Hora_Inicio:            r.horaInicio,
        Hora_Fin:               r.horaFin,
        Anular_Tiempo:          r.anularTiempo,
        Segundos_Historico:     r.segundosHistorico,
        Segundos_Trabajados:    r.segundosTrabajados,
        Segundos_Tiempo_Muerto: r.segundosTiempoMuerto,
        Dia:                    r.dia,
        Mes:                    r.mes,
        Quincena:               r.quincena,
        ID_Ejecucion:           null,
        Eliminar:               null,
        Revisado:               false
      }));

      const { error } = await sb.from('db_n8n_espejo').insert(payload);
      if (error) {
        errors++;
        console.error('Error en batch:', error);
      } else {
        done += chunk.length;
      }

      const pct = Math.round(((i + chunk.length) / toInsert.length) * 100);
      progressBar.style.width = pct + '%';
      progressText.textContent = `Insertando... ${Math.min(i + chunk.length, toInsert.length)} / ${toInsert.length}`;
    }

    progressText.textContent = `Listo.`;
    btnAnalizar.disabled = false;

    if (errors === 0) {
      showMsg('ok', `✓ Se insertaron ${done} fila${done !== 1 ? 's' : ''} correctamente.`);
      // Marcar como importadas en la tabla
      parsedRows.filter(r => r.status === 'ok').forEach(r => r.status = 'en_db');
      renderTable(parsedRows);
    } else {
      showMsg('err', `Se insertaron ${done} filas. Ocurrieron errores en ${errors} lote(s) — revisar consola.`);
    }
  }

  // ─── Analizar ─────────────────────────────────────────────────────────────
  btnAnalizar.addEventListener('click', async () => {
    const year = parseInt(yearInput.value);
    if (!year || year < 2020 || year > 2099) {
      alert('Ingresá un año válido.'); return;
    }

    btnAnalizar.disabled = true;
    btnAnalizar.innerHTML = '<span class="spinner"></span>Analizando...';
    hideMsg();
    resultCard.style.display = 'none';

    try {
      let text = csvPaste.value.trim();
      if (!text && fileInput.files.length > 0) {
        text = await fileInput.files[0].text();
      }
      if (!text) { showMsg('err', 'No hay datos para analizar.'); return; }

      parsedRows = parseCSV(text, year);
      if (!parsedRows.length) { showMsg('err', 'No se encontraron filas válidas en el CSV.'); return; }

      detectInternalDups(parsedRows);
      await checkDB(parsedRows);
      renderTable(parsedRows);

    } catch (e) {
      showMsg('err', 'Error: ' + e.message);
    } finally {
      btnAnalizar.disabled = false;
      btnAnalizar.innerHTML = 'Analizar';
      checkReady();
    }
  });

  btnImportar.addEventListener('click', importRows);

  // ─── Utilidades ───────────────────────────────────────────────────────────
  function esc(v) {
    return (v == null ? '' : String(v))
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showMsg(type, text) {
    msgBox.className = 'msg msg-' + type;
    msgBox.textContent = text;
    msgBox.style.display = '';
  }

  function hideMsg() {
    msgBox.style.display = 'none';
  }

})();
</script>
</body>
</html>
