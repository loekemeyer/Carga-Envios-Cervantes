<!DOCTYPE html>
<html lang="es">
<head>
  <script src="../auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrevistas</title>
  <link rel="icon" href="data:," />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', Arial, sans-serif; background: #d9d9de; padding: 16px; color: #222; }

    .top-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .btn-back { background: #f5f5f5; border: 2px solid #ccc; border-radius: 999px; padding: 8px 18px; font-size: 14px; color: #555; cursor: pointer; text-decoration: none; font-weight: 600; }
    .btn-back:hover { border-color: #888; }
    .top-bar h1 { font-size: 22px; color: #111; }

    .card { background: #fff; border: 1px solid #cfcfcf; border-radius: 12px; padding: 20px; max-width: 100%; margin: 0 auto; overflow-x: auto; }

    .header-fields { display: flex; gap: 18px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; font-weight: 700; color: #444; }
    .field input, .field select {
      height: 38px; border: 1px solid #c9d1d9; border-radius: 10px; padding: 0 12px;
      font-size: 15px; outline: none; background: #fff;
    }
    .field input:focus, .field select:focus { border-color: #4b89ff; }
    .field-nombre input { width: 280px; }
    .field-fecha input { width: 160px; }

    table { width: auto; border-collapse: collapse; font-size: 16px; table-layout: fixed; border: 1.5px solid #000; }
    th { background: #f5f5f5; padding: 11px 10px; text-align: center; font-weight: 800; color: #111; font-size: 15px; line-height: 1.25; border: 1px solid #000; }
    td { padding: 9px 10px; vertical-align: middle; text-align: center; border: 1px solid #000; font-size: 15px; }
    td > div { text-align: center; }
    td.num { font-variant-numeric: tabular-nums; font-weight: 700; }
    td input, td select {
      height: 40px; border: 1px solid #c9d1d9; border-radius: 8px; padding: 0 4px;
      font-size: 15px; outline: none; background: #fff; width: 100%; box-sizing: border-box;
      text-align: center;
    }
    td select { text-align-last: center; padding: 0 2px; }
    /* Ocultar spinners de input number (chrome/firefox) */
    td input[type="number"]::-webkit-outer-spin-button,
    td input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    td input[type="number"] { -moz-appearance: textfield; }

    /* Anchos columnas: # | Matriz | Hi | Hf | Uni | TSeg | TMin | THist | Pje | Seg/U | Op1..Op4 | Ent1..Ent2 | Del */
    table colgroup col:nth-child(1)  { width: 44px; }   /* # */
    table colgroup col:nth-child(2)  { width: 280px; }  /* Matriz — JS ajusta dinámicamente */
    table colgroup col:nth-child(3)  { width: 112px; }  /* Hora Inicio */
    table colgroup col:nth-child(4)  { width: 112px; }  /* Hora Fin */
    table colgroup col:nth-child(5)  { width: 96px; }   /* Uni */
    table colgroup col:nth-child(6)  { width: 88px; }   /* T. Total seg */
    table colgroup col:nth-child(7)  { width: 88px; }   /* T. Total min */
    table colgroup col:nth-child(8)  { width: 96px; }   /* T. Hist */
    table colgroup col:nth-child(9)  { width: 88px; }   /* Puntaje */
    table colgroup col:nth-child(10) { width: 88px; }   /* Seg/Uni */
    table colgroup col:nth-child(11) { width: 110px; }  /* Op 1 */
    table colgroup col:nth-child(12) { width: 110px; }  /* Op 2 */
    table colgroup col:nth-child(13) { width: 110px; }  /* Op 3 */
    table colgroup col:nth-child(14) { width: 110px; }  /* Op 4 */
    table colgroup col:nth-child(15) { width: 110px; }  /* Ent 1 */
    table colgroup col:nth-child(16) { width: 110px; }  /* Ent 2 */
    table colgroup col:nth-child(17) { width: 48px; }   /* Del */

    .ref-inline { font-size: 12px; color: #555; line-height: 1.4; }
    .ref-inline-item { display: inline-block; background: #eef; border-radius: 4px; padding: 1px 6px; margin: 1px 2px; font-weight: 600; }
    .ref-inline-item.entrev { background: #fef3c7; }
    .ref-inline-old { color: #f57c00; font-size: 10px; font-weight: 600; }
    .btn { background: #111; color: #fff; border: none; border-radius: 10px; padding: 9px 18px; font-weight: 700; font-size: 14px; cursor: pointer; }
    .btn:hover { opacity: 0.9; }
    .btn-secondary { background: #888; }
    .btn-print { background: #1565c0; }
    .btn-action { background: #e8eaf6; color: #283593; padding: 4px 8px; border-radius: 6px; font-size: 12px; min-width: 28px; width: 28px; }
    .btn-del { background: #fee2e2; color: #c62828; }
    .actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }

    .puntaje-good { color: #2e7d32; font-weight: 800; }
    .puntaje-bad { color: #c62828; font-weight: 800; }
    .puntaje-zero { color: #555; font-weight: 700; }

    /* Panel referencias */
    .ref-block { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px 16px; margin-top: 12px; }
    .ref-block h3 { font-size: 15px; margin-bottom: 8px; color: #111; font-weight: 700; }
    .ref-sub { font-size: 12px; color: #666; margin-bottom: 6px; font-weight: 600; }
    .ref-table { width: 100%; font-size: 13px; border-collapse: collapse; margin-bottom: 8px; }
    .ref-table th { background: #eef; padding: 6px 10px; text-align: left; font-weight: 700; }
    .ref-table td { padding: 5px 10px; border-bottom: 1px solid #eee; }
    .ref-table tr:last-child td { border-bottom: none; }
    .ref-empty { font-style: italic; color: #999; font-size: 12px; padding: 4px 0; }
    .ref-old { color: #f57c00; font-size: 11px; font-weight: 600; }

    /* Print */
    @page { size: A4 portrait; margin: 10mm; }
    .print-only-pivot { display: none; } /* solo en print */
    @media print {
      body { background: #fff; padding: 0; }
      .top-bar, .btn, .btn-back, .actions, .btn-del, #saveStatus, #mainTable, .header-fields { display: none !important; }
      .no-print { display: none !important; }
      .card { max-width: 100%; border: none; padding: 0; overflow: visible; }
      .print-only { display: block !important; }
      .print-only-pivot { display: table !important; }
      .puntaje-good, .puntaje-bad, .puntaje-zero { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

      /* TABLA PIVOTE: Fecha | Nombre | Mat A | Mat B | ... | Punto Global */
      #pivotTable { width: 100% !important; border-collapse: collapse; border: 1.5px solid #000 !important; font-size: 13px !important; margin-top: 8px; table-layout: auto !important; }
      #pivotTable th, #pivotTable td { border: 1px solid #000 !important; padding: 6px 8px !important; text-align: center !important; vertical-align: middle !important; font-size: 13px !important; }
      #pivotTable th { background: #eee !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-weight: 800; }
      #pivotTable tr.row-historico th { background: #eee !important; font-weight: 800; }
      #pivotTable tr.row-entrevistado { background: #fff7d6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-weight: 800; }
      #pivotTable tr.row-operario td { background: #f3f4f6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      #pivotTable td.nombre-cell { text-align: center !important; font-weight: 700; }
      #pivotTable td > div, #pivotTable td > span { text-align: center !important; }
      #pivotTable td.cat-cell {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        background: #eee !important;
        -webkit-print-color-adjust: exact; print-color-adjust: exact;
        width: 28px !important;
        padding: 4px 2px !important;
      }
    }
    .print-only { display: none; }
    .print-only h2 { font-size: 24px; margin-bottom: 8px; }
    .print-only .sub { font-size: 14px; color: #555; margin-bottom: 16px; }

    <a href="../Inicio/" class="btn-back">&#8592; Volver</a>

  </div>

  <div class="card">
    <div class="print-only">
      <h2>Planilla de Entrevista</h2>

    </div>

    <div class="header-fields">
      <div class="field field-nombre">

<script>
(function() {
  'use strict';

  const SUPABASE_URL = 'https://hrxfctzncixxqmpfhskv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhyeGZjdHpuY2l4eHFtcGZoc2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjQyNjEsImV4cCI6MjA4ODMwMDI2MX0.4L6wguch8UZGhC2VpzrWcCjJGUV-IkYsl9JoCWrOLUs';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let matricesMap = {}; // N_Matriz -> { Matriz, Tiempo_Historico }

  function esc(v) { return v == null ? '' : String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function hhmmToSec(h) {
    if (!h) return 0;
    const parts = h.split(':');
    return parseInt(parts[0] || 0) * 3600 + parseInt(parts[1] || 0) * 60 + parseInt(parts[2] || 0);
  }

  function fmtPuntaje(p) {
    if (p == null || isNaN(p)) return '<span class="puntaje-zero">-</span>';
    const cls = p > 0 ? 'puntaje-good' : (p < 0 ? 'puntaje-bad' : 'puntaje-zero');
    const sign = p > 0 ? '+' : '';
    return '<span class="' + cls + '">' + sign + p.toFixed(2) + '</span>';
  }

  function buildMatrizSelect(selected) {
    let opts = '<option value="">-- Seleccionar --</option>';
    const keys = Object.keys(matricesMap).sort((a,b) => parseInt(a) - parseInt(b));
    for (const k of keys) {
      const sel = k === selected ? ' selected' : '';
      opts += '<option value="' + esc(k) + '"' + sel + '>' + esc(k) + ' - ' + esc(matricesMap[k].Matriz) + '</option>';
    }
    return opts;
  }

  // Medir texto en canvas para calcular ancho exacto
  const _measureCanvas = document.createElement('canvas');
  const _measureCtx = _measureCanvas.getContext('2d');
  function medirTexto(texto, fuente) {
    _measureCtx.font = fuente;
    return _measureCtx.measureText(texto).width;
  }

  function ajustarAnchoMatriz() {
    const fuente = '700 15px Inter, Arial, sans-serif';
    let maxPx = 0;
    document.querySelectorAll('#mainTable .ent-matriz').forEach(sel => {
      const opt = sel.options[sel.selectedIndex];
      if (!opt || !opt.value) return;
      const w = medirTexto(opt.textContent, fuente);
      if (w > maxPx) maxPx = w;
    });
    // padding del select (4+4) + flecha (~24) + padding del td (10+10) + borde (2)
    const total = Math.max(280, Math.ceil(maxPx + 8 + 24 + 20 + 4));
    const col = document.querySelector('#mainTable colgroup col:nth-child(2)');
    if (col) col.style.width = total + 'px';
  }

  function agregarFila() {
    const body = document.getElementById('entBody');
    const idx = body.children.length + 1;
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="num">' + idx + '</td>' +
      '<td><select class="ent-matriz">' + buildMatrizSelect() + '</select></td>' +
      '<td><input type="time" class="ent-hini" /></td>' +
      '<td><input type="time" class="ent-hfin" /></td>' +
      '<td class="num"><input type="number" class="ent-uni" min="0" value="0" /></td>' +
      '<td class="num ent-tseg">-</td>' +
      '<td class="num ent-tmin">-</td>' +
      '<td class="num ent-thist">-</td>' +
      '<td class="num ent-pje">-</td>' +
      '<td class="num ent-segu">-</td>' +
      '<td class="num ent-op" data-i="0">-</td>' +
      '<td class="num ent-op" data-i="1">-</td>' +
      '<td class="num ent-op" data-i="2">-</td>' +
      '<td class="num ent-op" data-i="3">-</td>' +
      '<td class="num ent-ent" data-i="0">-</td>' +
      '<td class="num ent-ent" data-i="1">-</td>' +
      '<td class="no-print"><button class="btn btn-action btn-del">&#10005;</button></td>';
    body.appendChild(tr);

    // Listeners para recalcular
    tr.querySelectorAll('.ent-matriz, .ent-hini, .ent-hfin, .ent-uni').forEach(el => {
      el.addEventListener('input', () => calcularFila(tr));
      el.addEventListener('change', () => calcularFila(tr));
    });
    // Al cambiar matriz, refrescar panel de referencias y ancho columna
    tr.querySelector('.ent-matriz').addEventListener('change', () => {
      ajustarAnchoMatriz();
      actualizarRefs();
    });
    tr.querySelector('.btn-del').addEventListener('click', () => {
      tr.remove();
      renumerar();
      actualizarRefs();
    });
  }

  // ---------- Referencias ----------
  async function fetchReferencias(matKey) {
    // Devuelve { entrevistas: [...], operarios: [...] }
    // Cada item tiene _periodo: 'recent' (ultimos 2m) o 'older' (mas atras)
    // Logica: 1) llenar con mejores de ultimos 2m, 2) si falta, completar con los mas recientes mas atras
    const hoy = new Date();
    const hace2m = new Date(hoy); hace2m.setMonth(hace2m.getMonth() - 2);
    const cutoff2m = hace2m.toISOString().slice(0, 10);
    const cutoff2mTs = cutoff2m + 'T00:00:00';

    // ----- ENTREVISTAS (single query, ordenadas por fecha desc) -----
    const { data: entsRaw } = await sb.from('Entrevistas')
      .select('nombre, fecha, seg_por_uni, seg_total, uni, premio')
      .eq('matriz', matKey)
      .order('fecha', { ascending: false })
      .limit(200);
    const entsAll = entsRaw || [];
    const entsRecent = entsAll.filter(e => e.fecha >= cutoff2m).sort((a, b) => Number(a.seg_por_uni) - Number(b.seg_por_uni));
    let entrevistas = entsRecent.slice(0, 2).map(e => ({ ...e, _periodo: 'recent' }));
    if (entrevistas.length < 2) {
      // Completar con las mas recientes (ya ordenadas desc) mas atras de 2m, hasta llegar a 2
      const entsOlder = entsAll.filter(e => e.fecha < cutoff2m); // ya viene ordenado desc
      for (const e of entsOlder) {
        if (entrevistas.length >= 2) break;
        entrevistas.push({ ...e, _periodo: 'older' });
      }
    }

    // ----- OPERARIOS (single query, ordenadas por Fecha desc) -----
    const { data: opsRaw } = await sb.from('db_n8n_espejo')
      .select('Legajo, Nombre_Empleado, Dia, Mes, Uni, Tiempo_Toma, Fecha, Hora_Fin, Eliminar')
      .eq('Matriz', matKey)
      .gt('Uni', 0)
      .gt('Tiempo_Toma', 0)
      .order('Fecha', { ascending: false })
      .limit(500);
    const opsValid = (opsRaw || []).filter(r => r.Eliminar !== 'S');
    const opsRecent = opsValid.filter(r => r.Fecha && r.Fecha >= cutoff2mTs);
    const opsOlder = opsValid.filter(r => !r.Fecha || r.Fecha < cutoff2mTs);

    // Dedup por Legajo: quedarse con el MEJOR Tiempo_Toma por operario en cada periodo
    const dedupBestByLegajo = (rows) => {
      const best = {};
      rows.forEach(r => {
        const leg = String(r.Legajo || '').trim();
        if (!leg) return;
        if (!best[leg] || Number(r.Tiempo_Toma) < Number(best[leg].Tiempo_Toma)) best[leg] = r;
      });
      return Object.values(best);
    };

    // 1) Top operarios de ultimos 2m, ordenados por mejor Tiempo_Toma
    let operarios = dedupBestByLegajo(opsRecent)
      .sort((a, b) => Number(a.Tiempo_Toma) - Number(b.Tiempo_Toma))
      .slice(0, 4)
      .map(o => ({ ...o, _periodo: 'recent' }));

    // 2) Completar con operarios MAS RECIENTES de antes de 2m, excluyendo Legajos ya tomados
    if (operarios.length < 4) {
      const taken = new Set(operarios.map(o => String(o.Legajo).trim()));
      // opsOlder ya viene ordenado por Fecha desc; primer match por Legajo = más reciente
      const seenOld = new Set();
      for (const r of opsOlder) {
        if (operarios.length >= 4) break;
        const leg = String(r.Legajo || '').trim();
        if (!leg || taken.has(leg) || seenOld.has(leg)) continue;
        seenOld.add(leg);
        operarios.push({ ...r, _periodo: 'older' });
      }
    }

    // 3) Si aun falta, fallback HISTORICO en db_n8n_espejo: query separada ordenada por Tiempo_Toma asc (mejores de todos los tiempos)
    if (operarios.length < 4) {
      const taken = new Set(operarios.map(o => String(o.Legajo).trim()));
      const { data: opsHist } = await sb.from('db_n8n_espejo')
        .select('Legajo, Nombre_Empleado, Dia, Mes, Uni, Tiempo_Toma, Fecha, Hora_Fin, Eliminar')
        .eq('Matriz', matKey)
        .gt('Uni', 0)
        .gt('Tiempo_Toma', 0)
        .order('Tiempo_Toma', { ascending: true })
        .limit(200);
      const seen = new Set();
      for (const r of (opsHist || [])) {
        if (operarios.length >= 4) break;
        if (r.Eliminar === 'S') continue;
        const leg = String(r.Legajo || '').trim();
        if (!leg || taken.has(leg) || seen.has(leg)) continue;
        seen.add(leg);
        operarios.push({ ...r, _periodo: 'older' });
      }
    }

    // 4) Si AUN falta, buscar en tabla "Registros Historicos" (datos viejos archivados)
    if (operarios.length < 4) {
      const taken = new Set(operarios.map(o => String(o.Legajo).trim()));
      const { data: opsArch } = await sb.from('Registros Historicos')
        .select('Legajo, Nombre_Empleado, Matriz, Uni, Tiempo_Toma, Fecha')
        .eq('Matriz', matKey)
        .gt('Uni', 0)
        .gt('Tiempo_Toma', 0)
        .order('Tiempo_Toma', { ascending: true })
        .limit(200);
      const seen = new Set();
      for (const r of (opsArch || [])) {
        if (operarios.length >= 4) break;
        const leg = String(r.Legajo || '').trim();
        if (!leg || taken.has(leg) || seen.has(leg)) continue;
        seen.add(leg);
        // Normalizar fecha → Dia/Mes para mostrar igual que los otros
        let dia = null, mes = null;
        if (r.Fecha) {
          const d = new Date(r.Fecha);
          if (!isNaN(d)) { dia = d.getUTCDate(); mes = d.getUTCMonth() + 1; }
        }
        operarios.push({
          Legajo: r.Legajo, Nombre_Empleado: r.Nombre_Empleado,
          Matriz: r.Matriz, Uni: Number(r.Uni) || 0,
          Tiempo_Toma: Number(r.Tiempo_Toma) || 0,
          Dia: dia, Mes: mes, Fecha: r.Fecha,
          _periodo: 'older', _archivado: true
        });
      }
    }

    // Entrevistas fallback: si aun falta, query ordenada por seg_por_uni asc (mejores historicos)
    if (entrevistas.length < 2) {
      const takenNombres = new Set(entrevistas.map(e => e.nombre + '|' + e.fecha));
      const { data: entsHist } = await sb.from('Entrevistas')
        .select('nombre, fecha, seg_por_uni, seg_total, uni, premio')
        .eq('matriz', matKey)
        .order('seg_por_uni', { ascending: true })
        .limit(50);
      for (const e of (entsHist || [])) {
        if (entrevistas.length >= 2) break;
        const key = e.nombre + '|' + e.fecha;
        if (takenNombres.has(key)) continue;
        takenNombres.add(key);
        entrevistas.push({ ...e, _periodo: 'older' });
      }
    }

    return { entrevistas, operarios };
  }

  const refsCache = {};
  async function getRefs(matKey) {
    if (!refsCache[matKey]) refsCache[matKey] = await fetchReferencias(matKey);
    return refsCache[matKey];
  }

  async function actualizarRefs() {
    const rows = [...document.querySelectorAll('#entBody tr')];
    for (const tr of rows) {
      const matKey = tr.querySelector('.ent-matriz').value;
      const opCells = tr.querySelectorAll('.ent-op');
      const entCells = tr.querySelectorAll('.ent-ent');
      if (!matKey) {
        opCells.forEach(c => c.innerHTML = '-');
        entCells.forEach(c => c.innerHTML = '-');
        continue;
      }
      opCells.forEach(c => c.innerHTML = '<span style="color:#888;font-size:11px;">...</span>');
      entCells.forEach(c => c.innerHTML = '<span style="color:#888;font-size:11px;">...</span>');
      const refs = await getRefs(matKey);
      const tagOldHtml = (item) => item && item._periodo === 'older' ? '<sup class="ref-inline-old">h</sup>' : '';

      opCells.forEach((c, i) => {
        const o = refs.operarios[i];
        if (o) {
          const nombre = (o.Nombre_Empleado || '?');
          c.innerHTML =
            '<div style="font-size:12px;font-weight:600;color:#333;line-height:1.1;margin-bottom:2px;">' + esc(nombre) + '</div>' +
            '<div style="font-weight:700;">' + Number(o.Tiempo_Toma).toFixed(2) + ' ' + tagOldHtml(o) + '</div>';
          c.title = nombre + ' #' + (o.Legajo || '') + ' · ' + (o.Dia ? String(o.Dia).padStart(2,'0') + '/' + String(o.Mes).padStart(2,'0') : '') + (o._periodo === 'older' ? ' (>2m)' : '');
        } else {
          c.innerHTML = '<span style="color:#bbb;">-</span>';
          c.title = '';
        }
      });
      entCells.forEach((c, i) => {
        const e = refs.entrevistas[i];
        if (e) {
          c.innerHTML =
            '<div style="font-size:12px;font-weight:600;color:#333;line-height:1.1;margin-bottom:2px;">' + esc(e.nombre) + '</div>' +
            '<div style="font-weight:700;">' + Number(e.seg_por_uni).toFixed(2) + ' ' + tagOldHtml(e) + '</div>';
          c.title = e.nombre + ' (' + e.fecha + ')' + (e._periodo === 'older' ? ' (>2m)' : '');
        } else {
          c.innerHTML = '<span style="color:#bbb;">-</span>';
          c.title = '';
        }
      });

    }
  }

  function fmtFechaCorta(fecha) {
    if (!fecha) return '';
    const d = new Date(fecha);
    if (isNaN(d)) return fecha;
    const dia = String(d.getUTCDate()).padStart(2, '0');
    const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return dia + '-' + meses[d.getUTCMonth()];
  }

  async function buildPivotForPrint() {
    const filas = [...document.querySelectorAll('#entBody tr')];
    // Matrices únicas usadas en el form
    const matrices = [];
    const matKeys = new Set();
    filas.forEach(tr => {
      const m = tr.querySelector('.ent-matriz').value;
      if (m && !matKeys.has(m)) {
        matKeys.add(m);
        const info = matricesMap[m];
        matrices.push({ key: m, tHist: info ? Number(info.Tiempo_Historico) || 0 : 0, nombre: info ? info.Matriz : '' });
      }
    });

    // Fetch refs por matriz (cacheado)
    const allRefs = {};
    for (const m of matrices) allRefs[m.key] = await getRefs(m.key);

    // Helper: obtener fecha legible del operario row (de Fecha timestamptz, o de Dia/Mes)
    const fechaDeOpRow = (o) => {
      if (o.Fecha) return o.Fecha; // ISO string para fmtFechaCorta
      if (o.Dia && o.Mes) {
        const año = new Date().getFullYear();
        return año + '-' + String(o.Mes).padStart(2,'0') + '-' + String(o.Dia).padStart(2,'0');
      }
      return '';
    };

    // Agrupar operarios por Legajo (combinando seg/uni y puntajes de cada matriz)
    const operariosMap = {};
    matrices.forEach(m => {
      (allRefs[m.key].operarios || []).forEach(o => {
        const leg = String(o.Legajo || '').trim();
        if (!leg) return;
        if (!operariosMap[leg]) operariosMap[leg] = { nombre: o.Nombre_Empleado || leg, mats: {}, puntajes: {}, fechas: {}, _periodo: o._periodo };
        const segPorUni = Number(o.Tiempo_Toma);
        operariosMap[leg].mats[m.key] = segPorUni;
        operariosMap[leg].fechas[m.key] = fechaDeOpRow(o);
        if (m.tHist > 0 && segPorUni > 0) {
          operariosMap[leg].puntajes[m.key] = Math.round(((-(segPorUni / m.tHist) + 1) * 10) * 100) / 100;
        }
        if (o._periodo === 'recent') operariosMap[leg]._periodo = 'recent';
      });
    });

    // Agrupar entrevistas previas por nombre+fecha
    const entsMap = {};
    matrices.forEach(m => {
      (allRefs[m.key].entrevistas || []).forEach(e => {
        const key = e.nombre + '|' + e.fecha;
        if (!entsMap[key]) entsMap[key] = { nombre: e.nombre, fecha: e.fecha, mats: {}, puntajes: {} };
        const seg = Number(e.seg_por_uni);
        entsMap[key].mats[m.key] = seg;
        if (m.tHist > 0 && seg > 0) {
          entsMap[key].puntajes[m.key] = Math.round(((-(seg / m.tHist) + 1) * 10) * 100) / 100;
        }
      });
    });

    // Entrevistado actual (del formulario)
    const nombreActual = document.getElementById('entNombre').value.trim();
    const fechaActual = document.getElementById('entFecha').value;
    const matsActual = {}, puntajesActual = {};
    filas.forEach(tr => {
      const m = tr.querySelector('.ent-matriz').value;
      const hi = tr.querySelector('.ent-hini').value;
      const hf = tr.querySelector('.ent-hfin').value;
      const uni = parseFloat(tr.querySelector('.ent-uni').value) || 0;
      if (!m || !hi || !hf || uni <= 0) return;
      const seg = (hhmmToSec(hf) - hhmmToSec(hi)) / uni;
      matsActual[m] = seg;
      const matInfo = matricesMap[m];
      const tH = matInfo ? Number(matInfo.Tiempo_Historico) || 0 : 0;
      if (tH > 0) puntajesActual[m] = Math.round(((-(seg / tH) + 1) * 10) * 100) / 100;
    });

    // ----- Render -----
    const head = document.getElementById('pivotHead');
    const body = document.getElementById('pivotBody');

    // Header: Categoria | Nombre | Matriz ... | Punto Global
    let h = '<tr><th></th><th>Nombre</th>';
    matrices.forEach(m => h += '<th>Matriz<br>' + esc(m.key) + '</th>');
    h += '<th>Punto<br>Global</th></tr>';
    head.innerHTML = h;

    // Body
    let b = '';

    // Fila Historico (tiempos oficiales) — sin categoria
    b += '<tr class="row-historico"><th></th><th>Historico</th>';
    matrices.forEach(m => b += '<th>' + (m.tHist > 0 ? m.tHist.toFixed(2) : '') + '</th>');
    b += '<th></th></tr>';

    // Operarios — categoria "Empleados" con rowspan, sin Punto Global
    const opsList = Object.values(operariosMap);
    opsList.forEach((op, idx) => {
      const cat = idx === 0 ? '<td class="cat-cell" rowspan="' + opsList.length + '">Empleados</td>' : '';
      b += '<tr class="row-operario">' + cat + '<td class="nombre-cell">' + esc(op.nombre) + '</td>';
      matrices.forEach(m => {
        b += '<td>' + (op.mats[m.key] != null ? op.mats[m.key].toFixed(2) : '') + '</td>';
      });
      b += '<td></td></tr>';
    });

    // Entrevistas previas — categoria "Entrevistas" con rowspan + Punto Global
    const entsList = Object.values(entsMap);
    entsList.forEach((e, idx) => {
      const cat = idx === 0 ? '<td class="cat-cell" rowspan="' + entsList.length + '">Entrevistas</td>' : '';
      const punts = Object.values(e.puntajes);
      const avg = punts.length ? (punts.reduce((s,x) => s+x, 0) / punts.length) : null;
      b += '<tr>' + cat + '<td class="nombre-cell">' + esc(e.nombre) + '</td>';
      matrices.forEach(m => {
        b += '<td>' + (e.mats[m.key] != null ? e.mats[m.key].toFixed(2) : '') + '</td>';
      });
      b += '<td>' + (avg != null ? (avg >= 0 ? '+' : '') + avg.toFixed(2) : '') + '</td></tr>';
    });

    // Entrevistado actual — sin categoria, destacado
    if (Object.keys(matsActual).length) {
      const punts = Object.values(puntajesActual);
      const avg = punts.length ? (punts.reduce((s,x) => s+x, 0) / punts.length) : null;
      b += '<tr class="row-entrevistado"><td></td><td class="nombre-cell">' + esc(nombreActual || '(actual)') + '</td>';
      matrices.forEach(m => {
        b += '<td>' + (matsActual[m.key] != null ? matsActual[m.key].toFixed(2) : '') + '</td>';
      });
      b += '<td>' + (avg != null ? (avg >= 0 ? '+' : '') + avg.toFixed(2) : '') + '</td></tr>';
    }

    body.innerHTML = b;
  }

  async function guardar() {
    const nombre = document.getElementById('entNombre').value.trim();
    const fecha = document.getElementById('entFecha').value;
    const status = document.getElementById('saveStatus');
    if (!nombre) { status.style.color = '#c62828'; status.textContent = 'Falta el nombre del entrevistado.'; return; }
    if (!fecha) { status.style.color = '#c62828'; status.textContent = 'Falta la fecha.'; return; }

    const filas = [...document.querySelectorAll('#entBody tr')].filter(tr => {
      const m = tr.querySelector('.ent-matriz').value;
      const hi = tr.querySelector('.ent-hini').value;
      const hf = tr.querySelector('.ent-hfin').value;
      const u = parseFloat(tr.querySelector('.ent-uni').value) || 0;
      return m && hi && hf && u > 0;
    });
    if (!filas.length) { status.style.color = '#c62828'; status.textContent = 'No hay filas completas para guardar.'; return; }

    const btn = document.getElementById('btnGuardar');
    btn.disabled = true; btn.textContent = 'Guardando...';
    status.style.color = '#555'; status.textContent = 'Guardando ' + filas.length + ' fila(s)...';

    const rows = filas.map(tr => {
      const m = tr.querySelector('.ent-matriz').value;
      const hi = tr.querySelector('.ent-hini').value;
      const hf = tr.querySelector('.ent-hfin').value;
      const u = parseFloat(tr.querySelector('.ent-uni').value);
      const segTotal = Math.max(0, hhmmToSec(hf) - hhmmToSec(hi));
      const segPorUni = segTotal / u;
      const matInfo = matricesMap[m];
      const tHist = matInfo ? Number(matInfo.Tiempo_Historico) || 0 : 0;
      const premio = tHist > 0 ? Math.round(((-(segPorUni / tHist) + 1) * 10) * 100) / 100 : null;
      const hiFull = hi.length === 5 ? hi + ':00' : hi;
      const hfFull = hf.length === 5 ? hf + ':00' : hf;
      return {
        nombre, fecha, matriz: m,
        hora_inicio: hiFull, hora_fin: hfFull,
        uni: u, seg_total: segTotal, seg_por_uni: segPorUni,
        tiempo_historico: tHist || null, premio
      };
    });

    const { error } = await sb.from('Entrevistas').insert(rows);
    btn.disabled = false; btn.textContent = '💾 Guardar';
    if (error) {
      status.style.color = '#c62828';
      status.textContent = 'Error: ' + error.message;
    } else {
      status.style.color = '#2e7d32';
      status.textContent = 'Guardado: ' + rows.length + ' fila(s).';
      // Invalidar cache y refrescar referencias (la entrevista recién guardada puede aparecer en top)
      Object.keys(refsCache).forEach(k => delete refsCache[k]);
      actualizarRefs();
    }
  }

  function calcularFila(tr) {
    const matKey = tr.querySelector('.ent-matriz').value;
    const hIni = tr.querySelector('.ent-hini').value;
    const hFin = tr.querySelector('.ent-hfin').value;
    const uni = parseFloat(tr.querySelector('.ent-uni').value) || 0;
    const matInfo = matricesMap[matKey];
    const tHist = matInfo ? Number(matInfo.Tiempo_Historico) || 0 : 0;

    const thCell = tr.querySelector('.ent-thist');
    const sgCell = tr.querySelector('.ent-segu');
    const pjCell = tr.querySelector('.ent-pje');
    const tsCell = tr.querySelector('.ent-tseg');
    const tmCell = tr.querySelector('.ent-tmin');

    thCell.textContent = tHist > 0 ? tHist.toFixed(2) : '-';

    // Tiempo total: depende solo de hIni/hFin (no requiere Uni)
    if (hIni && hFin) {
      const segTotalCalc = Math.max(0, hhmmToSec(hFin) - hhmmToSec(hIni));
      tsCell.textContent = segTotalCalc;
      tmCell.textContent = (segTotalCalc / 60).toFixed(2);
    } else {
      tsCell.textContent = '-';
      tmCell.textContent = '-';
    }

    if (!hIni || !hFin || uni <= 0) {
      sgCell.textContent = '-';
      pjCell.innerHTML = '-';
      return;
    }
    const segTotal = Math.max(0, hhmmToSec(hFin) - hhmmToSec(hIni));
    const segPorUni = segTotal / uni;
    sgCell.textContent = segPorUni.toFixed(2);

    if (tHist > 0) {
      // Misma formula que monitor.html / app.js
      const premio = Math.round(((-(segPorUni / tHist) + 1) * 10) * 100) / 100;
      pjCell.innerHTML = fmtPuntaje(premio);
    } else {
      pjCell.innerHTML = '<span class="puntaje-zero">s/datos</span>';
    }
  }

  function renumerar() {
    document.querySelectorAll('#entBody tr').forEach((tr, i) => {
      tr.firstElementChild.textContent = (i + 1);
    });
  }

  async function init() {
    // Fecha default = hoy
    document.getElementById('entFecha').value = new Date().toISOString().slice(0, 10);

    // Cargar matrices
    const { data, error } = await sb.from('Matrices').select('N_Matriz, Matriz, Tiempo_Historico').order('N_Matriz');
    if (error) { alert('Error cargando matrices: ' + error.message); return; }
    (data || []).forEach(m => {
      matricesMap[String(m.N_Matriz).trim()] = { Matriz: m.Matriz, Tiempo_Historico: m.Tiempo_Historico };
    });

    // 3 filas iniciales
    for (let i = 0; i < 3; i++) agregarFila();
    ajustarAnchoMatriz();

    document.getElementById('btnAgregar').addEventListener('click', agregarFila);
    document.getElementById('btnGuardar').addEventListener('click', guardar);
    document.getElementById('btnImprimir').addEventListener('click', async () => {
      // Actualizar subtitulo print
      const nombre = document.getElementById('entNombre').value.trim() || '(sin nombre)';
      const fecha = document.getElementById('entFecha').value || '';
      document.getElementById('printSub').textContent = 'Entrevistado: ' + nombre + '   ·   Fecha: ' + fecha;
      // Garantizar refs y construir tabla pivote antes de imprimir
      await actualizarRefs();
      await buildPivotForPrint();
      window.print();
    });
  }

  init();
})();
</script>
