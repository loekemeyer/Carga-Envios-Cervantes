<!DOCTYPE html>
<html lang="es">
<head>
  <script src="../auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor en Vivo 2.0</title>
  <link rel="icon" href="data:," />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', Arial, sans-serif; background: #d9d9de; padding: 16px; color: #222; }

    .top-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .btn-back { background: #f5f5f5; border: 2px solid #ccc; border-radius: 999px; padding: 8px 18px; font-size: 14px; color: #555; cursor: pointer; text-decoration: none; font-weight: 600; }
    .btn-back:hover { border-color: #888; }
    .top-bar h1 { font-size: 22px; color: #111; }
    .live-dot { display: inline-block; width: 10px; height: 10px; background: #f44336; border-radius: 50%; animation: pulse 1.5s infinite; margin-left: 8px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .update-info { font-size: 12px; color: #888; margin-left: auto; }

    .table-wrap { background: #fff; border: 1px solid #cfcfcf; border-radius: 12px; overflow: auto; max-width: 1200px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: auto; }
    th { position: sticky; top: 0; background: #f5f5f5; padding: 8px 10px; text-align: left; font-weight: 700; border-bottom: 2px solid #ccc; color: #333; white-space: nowrap; }
    td { padding: 7px 10px; border-bottom: 1px solid #eee; vertical-align: middle; white-space: nowrap; }
    tr:hover td { background: #fafafa; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .badge-mat { display: inline-block; padding: 2px 8px; border-radius: 6px; background: #e3f2fd; color: #0d47a1; font-weight: 700; font-size: 12px; margin-right: 6px; }
    .premio-good { color: #2e7d32; font-weight: 700; }
    .premio-bad { color: #c62828; font-weight: 700; }
    .empty { padding: 40px; text-align: center; color: #999; font-size: 14px; }

    #alertWrap {
      position: fixed; top: 70px; right: 16px; width: 340px; max-height: calc(100vh - 90px);
      overflow-y: auto; z-index: 50; display: flex; flex-direction: column; gap: 10px;
    }
    #alertBadPremio, #alertGoodPremio { /* contenedores hijos sin posicion propia */ }
    .alert-bad-premio {
      background: #fee2e2; border: 2px solid #dc2626; border-radius: 10px;
      padding: 12px 16px; animation: pulse-alert 1.5s infinite;
    }
    .alert-bad-premio-item { display: block !important; margin: 6px 0 !important; }
    @media (max-width: 1100px) {
      #alertBadPremio { position: static; width: auto; max-height: none; margin-bottom: 14px; }
      .alert-bad-premio-item { display: inline-block !important; margin: 2px 4px 2px 0 !important; }
    }
    @keyframes pulse-alert { 0%, 100% { box-shadow: 0 0 0 rgba(220,38,38,0); } 50% { box-shadow: 0 0 16px rgba(220,38,38,0.5); } }
    .alert-bad-premio-titulo { font-weight: 900; font-size: 18px; color: #7f1d1d; margin-bottom: 6px; }
    .alert-bad-premio-lista { font-size: 14px; color: #111; }
    .alert-bad-premio-item { display: inline-block; background: #fff; border: 1px solid #dc2626; border-radius: 6px; padding: 3px 10px; margin: 2px 4px 2px 0; font-weight: 700; }
    .alert-bad-premio-item .premio-val { color: #c62828; margin-left: 6px; }
    /* Premio bueno (>=3) verde */
    .alert-good-premio {
      background: #d1fae5; border: 2px solid #059669; border-radius: 10px;
      padding: 12px 16px; animation: pulse-alert-good 1.5s infinite;
    }
    @keyframes pulse-alert-good { 0%, 100% { box-shadow: 0 0 0 rgba(5,150,105,0); } 50% { box-shadow: 0 0 16px rgba(5,150,105,0.5); } }
    .alert-good-premio-titulo { font-weight: 900; font-size: 18px; color: #065f46; margin-bottom: 6px; }
    .alert-good-premio-lista { font-size: 14px; color: #111; }
    .alert-good-premio-item { display: block; background: #fff; border: 1px solid #059669; border-radius: 6px; padding: 3px 10px; margin: 6px 0; font-weight: 700; }
    .alert-good-premio-item .premio-val { color: #059669; margin-left: 6px; }
    @media (max-width: 1100px) {
      #alertWrap { position: static; width: auto; max-height: none; margin-bottom: 14px; }
      .alert-good-premio-item { display: inline-block; margin: 2px 4px 2px 0; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="../Inicio/" class="btn-back">&#8592; Volver</a>
    <h1>Monitor en Vivo 2.0 <span class="live-dot"></span></h1>
    <span class="update-info" id="updateInfo"></span>
  </div>

  <div id="alertWrap">
    <div id="alertBadPremio"></div>
    <div id="alertGoodPremio"></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Legajo</th>
          <th>Nombre</th>
          <th>Matriz</th>
          <th class="num">Uni</th>
          <th class="num">Seg x uni</th>
          <th class="num">Tiempo histor</th>
          <th class="num">Premio</th>
          <th class="num">Uni x cajón</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="8" class="empty">Cargando...</td></tr>
      </tbody>
    </table>
  </div>

<script>
(function() {
  'use strict';

  const SUPABASE_URL = 'https://hrxfctzncixxqmpfhskv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhyeGZjdHpuY2l4eHFtcGZoc2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjQyNjEsImV4cCI6MjA4ODMwMDI2MX0.4L6wguch8UZGhC2VpzrWcCjJGUV-IkYsl9JoCWrOLUs';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const tbody = document.getElementById('tbody');
  const updateInfo = document.getElementById('updateInfo');

  // TM_CODES y NON_DOWNTIME se cargan de "Codificacion Mensajes".tipo.
  // Fallback: NON_DOWNTIME={E,C}, TM_CODES vacio. ISSUE_CODES deprecado.
  let TM_CODES = new Set();
  let ISSUE_CODES = new Set();
  let NON_DOWNTIME = new Set(['E','C']);

  async function cargarTiposCodigos() {
    try {
      const { data, error } = await sb.from('Codificacion Mensajes').select('Codigo,tipo');
      if (error) throw error;
      const tm = new Set();
      const prod = new Set();
      (data || []).forEach(r => {
        const cod = String(r.Codigo || '').toUpperCase();
        if (r.tipo === 'TIEMPO_MUERTO') tm.add(cod);
        else if (r.tipo === 'PRODUCCION') prod.add(cod);
      });
      if (tm.size) TM_CODES = tm;
      if (prod.size) NON_DOWNTIME = prod;
    } catch (e) {
      console.error('[monitor2] cargarTiposCodigos fallo, uso fallback:', e);
    }
  }

  let empleados = [];
  let matricesMap = {}; // N_Matriz -> { Matriz, Tiempo_Historico, Uni_X_Cajon }

  function esc(v) { return v == null ? '' : String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtNum(n, decimals=0) {
    if (n == null || isNaN(n)) return '-';
    return Number(n).toLocaleString('es-AR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  }

  async function init() {
    const [empRes, matRes] = await Promise.all([
      sb.from('Empleados').select('Legajo, Empleado, Activo').eq('Activo', 'SI'),
      sb.from('Matrices').select('N_Matriz, Matriz, Tiempo_Historico, Uni_X_Cajon'),
      cargarTiposCodigos()
    ]);
    empleados = (empRes.data || []).sort((a, b) => {
      const la = String(a.Legajo).trim(), lb = String(b.Legajo).trim();
      if (la === '1' && lb !== '1') return 1;
      if (lb === '1' && la !== '1') return -1;
      return parseInt(la.replace(/\D/g, '')) - parseInt(lb.replace(/\D/g, ''));
    });
    (matRes.data || []).forEach(m => {
      matricesMap[String(m.N_Matriz).trim()] = {
        Matriz: m.Matriz,
        Tiempo_Historico: m.Tiempo_Historico,
        Uni_X_Cajon: m.Uni_X_Cajon
      };
    });

    await refresh();
    setInterval(refresh, 15000);
  }

  // Determina si un operario esta produciendo ahora mismo (ultima accion E o C, sin TM abierto)
  function isProduciendo(empRegs) {
    if (!empRegs.length) return { producing: false, currentMatriz: null };
    let currentMatriz = null;
    let pendingTM = null;
    let lastIsCajonOrInicio = false;

    empRegs.forEach(r => {
      const op = r.opcion;
      // LT (Llegada Tarde) es msg automatico cuando entran pasadas las 8:30 — ignorar
      if (op === 'LT') return;
      if (op === 'E') {
        currentMatriz = r.texto || r.matriz || null;
        pendingTM = null;
        lastIsCajonOrInicio = true;
      } else if (op === 'C') {
        pendingTM = null;
        lastIsCajonOrInicio = true;
      } else if (!NON_DOWNTIME.has(op)) {
        if (pendingTM && pendingTM.opcion === op) {
          pendingTM = null;
          lastIsCajonOrInicio = true; // sigue en el cajon
        } else if (!pendingTM) {
          pendingTM = r;
          lastIsCajonOrInicio = false;
        }
      } else {
        lastIsCajonOrInicio = false;
      }
    });

    return {
      producing: !pendingTM && lastIsCajonOrInicio,
      currentMatriz: currentMatriz
    };
  }

  async function refresh() {
    const now = new Date();
    const hoy = now.toISOString().slice(0, 10);

    // Estado en vivo via Registros Produccion Cervantes
    const { data: registros } = await sb.from('Registros Produccion Cervantes')
      .select('legajo, opcion, descripcion, ts_event, matriz, texto')
      .gte('ts_event', hoy + 'T00:00:00')
      .lte('ts_event', hoy + 'T23:59:59')
      .order('ts_event', { ascending: true });

    const regs = registros || [];

    // Ultimos cajones cerrados de hoy via db_n8n_espejo (filtrar por Dia/Mes — Fecha es timestamptz)
    const dia = now.getDate();
    const mes = now.getMonth() + 1;
    const { data: cajones } = await sb.from('db_n8n_espejo')
      .select('Legajo, Matriz, Uni, Tiempo_Toma, Premio, Hora_Fin, Hora_Inicio, Eliminar, Dia, Mes')
      .eq('Dia', dia)
      .eq('Mes', mes)
      .gt('Uni', 0);

    // Map legajo -> ultimo cajon cerrado (mayor Hora_Fin)
    const lastCajonMap = {};
    (cajones || []).forEach(c => {
      if (c.Eliminar === 'S') return;
      const leg = String(c.Legajo).trim();
      const prev = lastCajonMap[leg];
      const horaCmp = c.Hora_Fin || c.Hora_Inicio || '';
      if (!prev || horaCmp > (prev.Hora_Fin || prev.Hora_Inicio || '')) {
        lastCajonMap[leg] = c;
      }
    });

    // Alertas premio: malos (<=-3) en rojo, buenos (>=3) en verde. Revisar TODOS los cajones del día.
    const empMap = {};
    empleados.forEach(e => { empMap[String(e.Legajo).trim()] = e.Empleado; });
    const badPremios = [];
    const goodPremios = [];
    (cajones || []).forEach(c => {
      if (c.Eliminar === 'S') return;
      const leg = String(c.Legajo).trim();
      if (leg === '1') return;
      const matNum = c.Matriz ? String(c.Matriz).trim() : null;
      const matInfo = matNum ? matricesMap[matNum] : null;
      if (!matInfo || !(matInfo.Tiempo_Historico > 0) || !(c.Tiempo_Toma > 0)) return;
      const premio = Math.round(((-(c.Tiempo_Toma / matInfo.Tiempo_Historico) + 1) * 10) * 100) / 100;
      const item = {
        legajo: leg, nombre: empMap[leg] || '?',
        matNum: matNum, matNombre: matInfo.Matriz,
        premio: premio, horaFin: c.Hora_Fin || ''
      };
      if (premio <= -3) badPremios.push(item);
      else if (premio >= 3) goodPremios.push(item);
    });
    badPremios.sort((a, b) => (b.horaFin || '').localeCompare(a.horaFin || ''));
    goodPremios.sort((a, b) => (b.horaFin || '').localeCompare(a.horaFin || ''));
    const alertEl = document.getElementById('alertBadPremio');
    if (badPremios.length) {
      alertEl.innerHTML = '<div class="alert-bad-premio">' +
        '<div class="alert-bad-premio-titulo">⚠ Cajones cerrados con puntaje &le; -3 (' + badPremios.length + ')</div>' +
        '<div class="alert-bad-premio-lista">' +
        badPremios.map(b =>
          '<span class="alert-bad-premio-item">' +
            esc(b.nombre) + ' #' + esc(b.legajo) + ' · Mat ' + esc(b.matNum) + ' ' + esc(b.matNombre) +
            '<span class="premio-val">' + b.premio.toFixed(1) + '</span>' +
          '</span>'
        ).join('') +
        '</div></div>';
    } else {
      alertEl.innerHTML = '';
    }
    const alertElG = document.getElementById('alertGoodPremio');
    if (goodPremios.length) {
      alertElG.innerHTML = '<div class="alert-good-premio">' +
        '<div class="alert-good-premio-titulo">⭐ Cajones cerrados con puntaje &ge; 3 (' + goodPremios.length + ')</div>' +
        '<div class="alert-good-premio-lista">' +
        goodPremios.map(b =>
          '<span class="alert-good-premio-item">' +
            esc(b.nombre) + ' #' + esc(b.legajo) + ' · Mat ' + esc(b.matNum) + ' ' + esc(b.matNombre) +
            '<span class="premio-val">+' + b.premio.toFixed(1) + '</span>' +
          '</span>'
        ).join('') +
        '</div></div>';
    } else {
      alertElG.innerHTML = '';
    }

    const filas = [];
    empleados.forEach(emp => {
      const leg = String(emp.Legajo).trim();
      if (leg === '1') return; // ficha de prueba
      const empRegs = regs.filter(r => String(r.legajo).trim() === leg);
      const estado = isProduciendo(empRegs);
      if (!estado.producing) return;

      const matNum = estado.currentMatriz ? String(estado.currentMatriz).trim() : null;
      const matInfoActiva = matNum ? matricesMap[matNum] : null;
      const ultCajon = lastCajonMap[leg];
      // Datos de Uni/Seg/Hist/Premio se basan en la matriz del ultimo cajon (coherencia interna)
      const matNumCajon = ultCajon && ultCajon.Matriz ? String(ultCajon.Matriz).trim() : null;
      const matInfoCajon = matNumCajon ? matricesMap[matNumCajon] : null;

      // Premio live: round((-(Tiempo_Toma / Tiempo_Historico) + 1) * 10 * 100) / 100 (igual maestro/app.js)
      let premioCalc = null;
      if (ultCajon && matInfoCajon && matInfoCajon.Tiempo_Historico > 0 && ultCajon.Tiempo_Toma > 0) {
        premioCalc = Math.round(((-(ultCajon.Tiempo_Toma / matInfoCajon.Tiempo_Historico) + 1) * 10) * 100) / 100;
      }

      filas.push({
        legajo: leg,
        nombre: emp.Empleado,
        matriz: matNum,
        matrizNombre: matInfoActiva ? matInfoActiva.Matriz : '',
        uni: ultCajon ? ultCajon.Uni : null,
        segXUni: ultCajon ? ultCajon.Tiempo_Toma : null,
        tiempoHist: matInfoCajon ? matInfoCajon.Tiempo_Historico : null,
        premio: premioCalc,
        uniXCajon: matInfoActiva ? matInfoActiva.Uni_X_Cajon : null
      });
    });

    if (!filas.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty">Sin operarios produciendo en este momento.</td></tr>';
    } else {
      tbody.innerHTML = filas.map(f => {
        const matCell = f.matriz
          ? '<span class="badge-mat">' + esc(f.matriz) + '</span>' + esc(f.matrizNombre || '')
          : '-';
        let premioCell = '-';
        if (f.premio != null) {
          const cls = Number(f.premio) >= 0 ? 'premio-good' : 'premio-bad';
          premioCell = '<span class="' + cls + '">' + fmtNum(f.premio, 1) + '</span>';
        }
        return '<tr>' +
          '<td>' + esc(f.legajo) + '</td>' +
          '<td>' + esc(f.nombre) + '</td>' +
          '<td>' + matCell + '</td>' +
          '<td class="num">' + fmtNum(f.uni) + '</td>' +
          '<td class="num">' + fmtNum(f.segXUni, 2) + '</td>' +
          '<td class="num">' + fmtNum(f.tiempoHist, 2) + '</td>' +
          '<td class="num">' + premioCell + '</td>' +
          '<td class="num">' + fmtNum(f.uniXCajon) + '</td>' +
        '</tr>';
      }).join('');
    }

    updateInfo.textContent = 'Actualizado: ' + now.toLocaleTimeString('es-AR');
  }

  init();
})();
</script>
</body>
</html>
