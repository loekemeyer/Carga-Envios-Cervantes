<!DOCTYPE html>
<html lang="es">
<head>
  <script src="auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculadora</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 36px;
      width: 100%; max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      text-align: center;
    }
    h1 {
      font-size: 30px; font-weight: 800;
      color: #0f172a; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 32px;
    }
    .btns { display: grid; gap: 16px; }
    .btn {
      display: block; width: 100%;
      padding: 22px 18px;
      border: none; border-radius: 16px;
      font-family: inherit; font-size: 18px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: #fff; cursor: pointer;
      transition: transform .08s, opacity .15s;
      text-decoration: none;
    }
    .btn:hover { opacity: .92; }
    .btn:active { transform: scale(.985); }
    .btn-basica  { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .btn-cajones { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
    .back {
      margin-top: 28px;
      background: none; border: none;
      color: #64748b; font-size: 13px; cursor: pointer;
      text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
    }
    .back:hover { color: #0f172a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Calculadora</h1>
    <div class="btns">
      <a class="btn btn-basica"  href="calculadora-basica.html">Calculadora Básica</a>
      <a class="btn btn-cajones" href="calcular-cajones.html">Calcular Cajones</a>
    </div>
    <button class="back" onclick="window.location.href='envios-only.html'">← Volver a envíos</button>
  </div>
</body>
</html>
