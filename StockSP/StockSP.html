<!doctype html>
<html lang="es">
  <head>
    <script src="../auth-guard.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Control SP Kg</title>

    <!-- BLOQUE: SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- BLOQUE: CSS -->
    <link rel="stylesheet" href="StockSP.css" />
  </head>
  <body>
    <div class="card">
      <!-- BLOQUE: BOTON VOLVER -->
      <button
        onclick="window.location.href = '../Inicio/index.html'"
        class="tallerista-btn btn-volver-home"
      >
        ← Volver al inicio
      </button>

      <!-- BLOQUE: TITULO -->
      <h1>Control SP Kg</h1>

      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
        <input type="text" id="searchInput" class="search-input" placeholder="Buscar por sector o descripción…" />
        <select id="filtroPS" style="height:36px;border:1px solid #ccc;border-radius:8px;padding:0 10px;font-size:14px;background:#fff;cursor:pointer">
          <option value="">Todos los Talleristas</option>
        </select>
        <select id="filtroProvServ" style="height:36px;border:1px solid #ccc;border-radius:8px;padding:0 10px;font-size:14px;background:#fff;cursor:pointer">
          <option value="">Todos los Prov Serv</option>
        </select>
      </div>

      <!-- BLOQUE: ESTADO -->
      <div id="status" class="status">Cargando...</div>

      <!-- BLOQUE: RESULTADO -->
      <div id="result"></div>
    </div>

    <!-- BLOQUE: JS -->
    <script src="StockSP.js"></script>
  </body>
</html>
