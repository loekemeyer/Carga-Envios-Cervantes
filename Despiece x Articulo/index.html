<!doctype html>
<html lang="es">
  <head>
    <script src="../auth-guard.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Despiece x Articulo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <div class="card">
        <button onclick="window.location.href='../Inicio/index.html'" class="btn btn-volver" id="btnVolverInicio">&larr; Volver al inicio</button>
        <script>if (window.self !== window.top) { const b = document.getElementById('btnVolverInicio'); if (b) b.style.display = 'none'; }</script>
        <h1>Despiece x Articulo</h1>
        <p class="sub">Trazado desde el tallerista hasta el fleje/compra, paso por paso.</p>

        <div class="barra">
          <label>Artículo:</label>
          <select id="selArt"><option value="">— elegí un artículo —</option></select>
          <button id="btnTrazar" class="btn btn-dark">Trazar</button>
          <button id="btnExport" class="btn btn-ghost" disabled>Exportar CSV</button>
          <button id="btnResumen" class="btn btn-ghost" title="Ver cobertura de trazado de todos los artículos">📊 Ver resumen</button>
        </div>

        <div id="status" class="status">Elegí un artículo y presioná "Trazar".</div>

        <div id="tablaWrap" class="tabla-wrap"></div>
      </div>
    </div>

    <script src="app.js?v=11"></script>
  </body>
</html>
