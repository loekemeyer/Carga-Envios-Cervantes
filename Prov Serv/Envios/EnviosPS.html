<!doctype html>
<html lang="es">
<head>
  <script src="../../auth-guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Envío a Proveedores de Servicios</title>
  <link rel="stylesheet" href="EnviosPS.css" />
</head>
<body>

  <div class="card">
    <!-- HEADER -->
    <div class="header-top">
      <button onclick="gpHome()" class="btn-home" type="button">← Inicio</button>
      <h1>Envío a Proveedores de Servicios</h1>
      <button id="btnVolver" class="btn-volver hidden" type="button">← Cambiar</button>
      <button onclick="gpLogout()" class="btn-home" type="button" style="background:#fee2e2;border-color:#dc2626;color:#991b1b;margin-left:8px;">⎋ Cerrar sesión</button>
    </div>
    <script>
      function gpHome(){
        var r = sessionStorage.getItem('gp_role') || 'admin';
        window.location.href = (r === 'envios') ? '../../envios-only.html' : '../../Inicio/index.html';
      }
      function gpLogout(){
        sessionStorage.clear();
        window.location.href = '../../login.html?logout=1';
      }
    </script>

    <!-- FASE 0: SELECCIONAR PROVEEDOR -->
    <div id="fase0" class="fase-container">
      <div id="psGridWrap" class="ps-grid-wrap">
        <div id="psGrid" class="ps-grid"></div>
      </div>
      <div id="status" class="status"></div>
    </div>

    <!-- FASE 1: CARGAR CAJONES -->
    <div id="fase1" class="fase-container hidden">
      <div class="fase-header">
        <h2 id="fase1Title">Proveedor</h2>
      </div>
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Parte</th>
              <th>Proceso</th>
              <th>SC</th>
              <th class="right">Caj</th>
            </tr>
          </thead>
          <tbody id="fase1TableBody"></tbody>
        </table>
      </div>
      <div class="footer-actions">
        <button id="btnSiguiente" class="btn-enviar hidden" type="button">Siguiente →</button>
      </div>
    </div>

    <!-- FASE 2: CARGAR KG / UNI -->
    <div id="fase2" class="fase-container hidden">
      <div class="fase-header">
        <h2 id="fase2Title">Cargar Pesos (Kg)</h2>
        <button id="btnVolverFase1" class="btn-volver-fases" type="button">← Atrás</button>
      </div>
      <div style="padding:8px 12px;display:flex;align-items:center;gap:10px">
        <label for="fechaEnvio" style="font-weight:800;font-size:14px">Fecha:</label>
        <input type="date" id="fechaEnvio" style="height:38px;border-radius:10px;border:2px solid #d0d7de;padding:0 10px;font-size:14px">
      </div>
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Parte</th>
              <th>Proceso</th>
              <th>SC</th>
              <th class="right">Caj</th>
              <th class="right" id="fase2HdrCantidad">Kg</th>
            </tr>
          </thead>
          <tbody id="fase2TableBody"></tbody>
        </table>
      </div>
      <div class="footer-actions">
        <button id="btnEnviar" class="btn-enviar disabled" type="button" disabled>Enviar</button>
      </div>
    </div>

    <!-- FASE 3: CONFIRMACIÓN -->
    <div id="fase3" class="fase-container hidden">
      <div class="fase-header success-header">
        <h2>✓ Envío registrado</h2>
      </div>
      <div id="successBox" class="success-box">
        <div class="success-msg">Tu código de envío:</div>
        <div id="successCode" class="success-code">—</div>
      </div>
      <div class="footer-actions">
        <button id="btnVolverPS" class="btn-enviar" type="button">← Cambiar proveedor</button>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="EnviosPS.js"></script>
</body>
</html>
