<!doctype html>
<html lang="es">
<head>
  <script src="../auth-guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Informes Produccion</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="informes.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="header">
        <div>
          <h1>Informes de Produccion</h1>
          <p class="muted">Analisis de rendimiento y productividad</p>
        </div>
        <button class="btn btn-dark" onclick="window.location.href='../Inicio/index.html'">Inicio</button>
      </div>

      <!-- FILTROS -->
      <div class="filtros">
        <div class="field" id="fieldFechaRango">
          <label>Rango de fechas</label>
          <input type="text" id="fechaRango" placeholder="Seleccionar rango..." autocomplete="off" style="min-width:220px;" />
          <input type="hidden" id="fechaDesde" />
          <input type="hidden" id="fechaHasta" />
        </div>
        <div class="field">
          <label>Vista</label>
          <select id="selVista">
            <option value="matriz">Rendimiento x Matriz</option>
            <option value="matriz2">Rendimiento x Matriz 2.0</option>
            <option value="piedra">Rendimiento Piedra</option>
            <option value="persona">Rendimiento x Persona</option>
            <option value="operario">Produccion x Operario</option>
            <option value="unidades">Unidades x Matriz (dias productivos)</option>
            <option value="rdiario">Reporte Diario</option>
            <option value="mensajes">Mensajes Operarios</option>
          </select>
        </div>
        <div class="field field-btn">
          <button id="btnGenerar" class="btn btn-primary">Generar</button>
          <button id="btnExcelInf" class="btn btn-excel hidden">Excel</button>
          <button id="btnPDFInf" class="btn btn-pdf hidden">PDF</button>
          <button id="btnPDFDiario" class="btn btn-pdf hidden">PDF Diario</button>
        </div>
      </div>

      <div id="status" class="status"></div>

      <!-- SUBFILTROS (aparecen despues de generar) -->
      <div id="subfiltros" class="hidden">
        <div id="empGrid" class="emp-chips"></div>
        <div id="tipoMatrizWrap" class="tipo-matriz-wrap">
          <label class="tipo-label">Tipo de Matriz:</label>
          <div id="tipoGrid" class="tipo-chips"></div>
        </div>
        <div id="filtroMatrizWrap" class="filtro-matriz-wrap hidden">
          <div class="field" style="min-width:200px;">
            <label>Filtrar Matriz</label>
            <input type="text" id="filtroMatriz" placeholder="N° o descripcion..." />
          </div>
          <div class="field" style="min-width:160px;">
            <label>Mostrar</label>
            <select id="selMetrica">
              <option value="ambos">Seg x Uni y Puntaje</option>
              <option value="segxuni">Seg x Uni</option>
              <option value="premio">Puntaje</option>
            </select>
          </div>
        </div>
      </div>

      <div id="result"></div>

      <!-- MODAL DETALLES -->
      <div id="detallesModal" class="modal hidden">
        <div class="modal-content">
          <div class="modal-header">
            <h2 id="detallesTitle">Detalles</h2>
            <button class="modal-close" onclick="document.getElementById('detallesModal').classList.add('hidden')">&times;</button>
          </div>
          <div class="modal-body">
            <table class="tbl-detalles">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Fecha</th>
                  <th>Ini</th>
                  <th>Fin</th>
                  <th class="r">Uni</th>
                  <th class="r">Seg</th>
                  <th class="r">Seg x Uni</th>
                </tr>
              </thead>
              <tbody id="detallesBody"></tbody>
              <tfoot>
                <tr style="font-weight:bold;border-top:2px solid #333;">
                  <td colspan="4">TOTAL</td>
                  <td class="r" id="detallesTotalUni">-</td>
                  <td class="r" id="detallesTotalSeg">-</td>
                  <td class="r" id="detallesTotalSegXUni">-</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="informes.js"></script>
</body>
</html>
