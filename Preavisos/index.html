<!doctype html>
<html lang="es">
<head>
<script src="../auth-guard.js"></script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Preaviso de Entrega</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#f5f6f8;color:#111;padding:12px}
  .card{max-width:600px;margin:auto;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden}
  .header{background:#1a1a1a;color:#fff;padding:14px 18px}
  .header h1{font-size:16px;font-weight:700;letter-spacing:.3px}
  .header .sub{font-size:13px;color:#aaa;margin-top:4px}
  .info{padding:12px 18px;background:#f9f9f9;border-bottom:1px solid #eee;font-size:13px;color:#555}
  .info b{color:#111}

  .items{padding:0}
  .item{display:grid;grid-template-columns:1fr 90px;align-items:center;padding:10px 18px;border-bottom:1px solid #f0f0f0;gap:8px}
  .item:last-child{border-bottom:none}
  .item-code{font-weight:700;font-size:14px}
  .item-desc{font-size:12px;color:#555;margin-top:2px}
  .item input{
    width:100%;height:40px;border:2px solid #d0d7de;border-radius:8px;
    text-align:center;font-size:16px;font-weight:700;
  }
  .item input:focus{outline:none;border-color:#111}
  .item input.has-val{border-color:#0a7a2f;background:#f3fbf6}

  .actions{padding:14px 18px;display:flex;gap:10px}
  .btn{
    flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;
    font-weight:800;cursor:pointer;text-align:center;
  }
  .btn-primary{background:#111;color:#fff}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-secondary{background:#fff;border:2px solid #d0d7de;color:#111}

  .msg{padding:12px 18px;font-size:13px;text-align:center}
  .msg.ok{color:#0a7a2f;background:#f3fbf6}
  .msg.bad{color:#b42318;background:#fef3f2}
  .msg.info{color:#555;background:#f9f9f9}

  .success{padding:24px 18px;text-align:center}
  .success .icon{font-size:48px;margin-bottom:8px}
  .success .title{font-size:18px;font-weight:800;margin-bottom:6px}
  .success .detail{font-size:13px;color:#555}

  .hidden{display:none}

  .search{padding:10px 18px;border-bottom:1px solid #eee}
  .search input{
    width:100%;height:38px;border:2px solid #d0d7de;border-radius:8px;
    padding:0 12px;font-size:14px;
  }
  .search input:focus{outline:none;border-color:#111}
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>Preaviso de Entrega</h1>
    <div class="sub" id="headerSub">Cargando...</div>
  </div>

  <div id="infoBar" class="info hidden"></div>
  <div id="msgTop" class="msg info">Cargando artículos...</div>

  <div id="searchBox" class="search hidden">
    <input type="text" id="txtBuscar" placeholder="Buscar código o descripción...">
  </div>

  <div id="itemsList" class="items"></div>

  <div id="actions" class="actions hidden">
    <button id="btnLimpiar" class="btn btn-secondary" type="button">Limpiar</button>
    <button id="btnEnviar" class="btn btn-primary" type="button" disabled>Enviar Preaviso</button>
  </div>

  <div id="successBox" class="success hidden">
    <div class="icon">&#10003;</div>
    <div class="title">Preaviso enviado</div>
    <div class="detail" id="successDetail"></div>
    <br>
    <button class="btn btn-primary" onclick="location.reload()" style="max-width:200px;margin:auto">Nuevo preaviso</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
"use strict";

const SUPABASE_URL = "https://hrxfctzncixxqmpfhskv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhyeGZjdHpuY2l4eHFtcGZoc2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjQyNjEsImV4cCI6MjA4ODMwMDI2MX0.4L6wguch8UZGhC2VpzrWcCjJGUV-IkYsl9JoCWrOLUs";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const headerSub = document.getElementById("headerSub");
const infoBar = document.getElementById("infoBar");
const msgTop = document.getElementById("msgTop");
const searchBox = document.getElementById("searchBox");
const txtBuscar = document.getElementById("txtBuscar");
const itemsList = document.getElementById("itemsList");
const actions = document.getElementById("actions");
const btnEnviar = document.getElementById("btnEnviar");
const btnLimpiar = document.getElementById("btnLimpiar");
const successBox = document.getElementById("successBox");
const successDetail = document.getElementById("successDetail");

// Leer params de URL
const params = new URLSearchParams(window.location.search);
const tipo = (params.get("tipo") || "").toLowerCase(); // "ps" o "tall"
const nombre = params.get("nombre") || "";
const cod = params.get("cod") || "";

let items = [];
let provNombre = "";
let unidad = "Cajas";

function esc(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function normalizeText(s) {
  return String(s ?? "").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
}

function arDateISO() {
  return new Intl.DateTimeFormat("sv-SE", {
    timeZone:"America/Argentina/Buenos_Aires",
    year:"numeric", month:"2-digit", day:"2-digit"
  }).format(new Date());
}

/* ============ CARGAR ITEMS ============ */
async function cargarItemsPS() {
  const COL_PS = "Prov_Serv";
  const { data, error } = await sb
    .from("Partes x PS")
    .select("Proceso, Parte, SC, SP")
    .eq(COL_PS, nombre)
    .order("Parte", { ascending: true });

  if (error) throw error;
  if (!data || !data.length) return [];

  provNombre = nombre;
  unidad = "Cajones";

  const seen = new Set();
  return data.filter(r => {
    const k = (r.Parte || "") + "|" + (r.Proceso || "");
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  }).map(r => ({
    codigo: r.Parte || "",
    descripcion: r.Proceso || "",
    sector: r.SP || r.SC || ""
  }));
}

async function cargarItemsTall() {
  const { data, error } = await sb
    .from("Articulos Virgilio X Tallerista")
    .select("Cod_Art, Desc, Tallerista")
    .eq("Cod_Tallerista", cod)
    .order("Cod_Art", { ascending: true });

  if (error) throw error;
  if (!data || !data.length) return [];

  provNombre = data[0].Tallerista || cod;
  unidad = "Cajas";

  const seen = new Set();
  return data.filter(r => {
    const k = r.Cod_Art || "";
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  }).map(r => ({
    codigo: String(r.Cod_Art || "").trim(),
    descripcion: String(r.Desc || "").trim(),
    sector: ""
  }));
}

/* ============ RENDER ============ */
function renderItems(filtered) {
  itemsList.innerHTML = "";
  (filtered || items).forEach((item, i) => {
    const idx = items.indexOf(item);
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div>
        <div class="item-code">${esc(item.codigo)}</div>
        <div class="item-desc">${esc(item.descripcion)}</div>
      </div>
      <input type="text" inputmode="numeric" placeholder="0"
        data-idx="${idx}" data-role="cant"
        value="${item._cant || ""}">
    `;
    const inp = div.querySelector("input");
    inp.addEventListener("input", () => {
      inp.value = inp.value.replace(/\D/g, "");
      items[idx]._cant = inp.value;
      inp.classList.toggle("has-val", inp.value !== "" && inp.value !== "0");
      updateBtn();
    });
    inp.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        const next = div.nextElementSibling?.querySelector("input");
        if (next) next.focus();
      }
    });
    itemsList.appendChild(div);
  });
}

function updateBtn() {
  const has = items.some(it => it._cant && Number(it._cant) > 0);
  btnEnviar.disabled = !has;
}

/* ============ BUSCAR ============ */
txtBuscar.addEventListener("input", () => {
  const q = normalizeText(txtBuscar.value);
  if (!q) { renderItems(); return; }
  const filtered = items.filter(it =>
    normalizeText(it.codigo).includes(q) || normalizeText(it.descripcion).includes(q)
  );
  renderItems(filtered);
});

/* ============ LIMPIAR ============ */
btnLimpiar.onclick = () => {
  items.forEach(it => it._cant = "");
  renderItems();
  updateBtn();
};

/* ============ ENVIAR ============ */
btnEnviar.onclick = async () => {
  const toSend = items.filter(it => it._cant && Number(it._cant) > 0);
  if (!toSend.length) return;

  const resumen = toSend.map(it => `${it.codigo}: ${it._cant} ${unidad}`).join("\n");
  if (!confirm(`Confirmar preaviso:\n\n${resumen}`)) return;

  btnEnviar.disabled = true;
  btnEnviar.textContent = "Enviando...";

  try {
    const registros = toSend.map(it => ({
      tipo: tipo.toUpperCase(),
      proveedor: provNombre,
      cod_prov: tipo === "tall" ? cod : nombre,
      fecha: arDateISO(),
      codigo: it.codigo,
      descripcion: it.descripcion,
      cantidad: Number(it._cant),
      unidad: unidad,
      estado: "pendiente"
    }));

    const { error } = await sb.from("Preavisos").insert(registros);
    if (error) throw error;

    msgTop.classList.add("hidden");
    searchBox.classList.add("hidden");
    itemsList.classList.add("hidden");
    actions.classList.add("hidden");

    successDetail.textContent = `${toSend.length} artículo(s) preavisado(s) para ${provNombre}`;
    successBox.classList.remove("hidden");

  } catch (err) {
    console.error(err);
    alert("Error al enviar: " + (err.message || err));
    btnEnviar.disabled = false;
    btnEnviar.textContent = "Enviar Preaviso";
  }
};

/* ============ INIT ============ */
async function init() {
  if (!tipo || (tipo === "ps" && !nombre) || (tipo === "tall" && !cod)) {
    headerSub.textContent = "";
    msgTop.className = "msg bad";
    msgTop.textContent = "Link inválido. Parámetros requeridos: ?tipo=ps&nombre=X o ?tipo=tall&cod=XXXX";
    return;
  }

  try {
    if (tipo === "ps") {
      headerSub.textContent = `Proveedor de Servicio: ${nombre}`;
      items = await cargarItemsPS();
    } else if (tipo === "tall") {
      items = await cargarItemsTall();
      headerSub.textContent = `Tallerista: ${provNombre || cod}`;
    } else {
      throw new Error("Tipo inválido. Usar 'ps' o 'tall'.");
    }

    if (!items.length) {
      msgTop.className = "msg bad";
      msgTop.textContent = "No se encontraron artículos para este proveedor/tallerista.";
      return;
    }

    infoBar.innerHTML = `<b>${provNombre}</b> — ${items.length} artículos · Unidad: <b>${unidad}</b>`;
    infoBar.classList.remove("hidden");

    msgTop.classList.add("hidden");
    searchBox.classList.remove("hidden");
    actions.classList.remove("hidden");

    renderItems();

  } catch (err) {
    console.error(err);
    msgTop.className = "msg bad";
    msgTop.textContent = "Error: " + (err.message || err);
  }
}

init();
</script>
</body>
</html>
