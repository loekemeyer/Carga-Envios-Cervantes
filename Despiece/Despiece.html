<!doctype html>
<html lang="es">
  <head>
    <script src="../auth-guard.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Despiece x Artículo</title>

    <!-- BLOQUE: SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- BLOQUE: CSS -->
    <link rel="stylesheet" href="Despiece.css?v=9" />
  </head>
  <body>
    <div class="card">
      <!-- BLOQUE: BOTON VOLVER -->
      <button
        onclick="window.location.href = '../Inicio/index.html'"
        class="tallerista-btn btn-volver-home"
      >
        ← Volver al inicio
      </button>

      <!-- BLOQUE: TITULO -->
      <h1>Despiece x Artículo</h1>

      <!-- BLOQUE: HERRAMIENTAS -->
      <div class="row-tools">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Buscar por código, sector o descripción…"
        />
        <select id="filtroRubro" class="filtro-rubro">
          <option value="">Todos los rubros</option>
        </select>
        <button id="btnAgregar" type="button" class="btn-agregar">+ Agregar</button>
        <button id="btnDuplicar" type="button" class="btn-duplicar">⧉ Duplicar</button>
        <button id="btnExcel" type="button" class="btn-download btn-excel" title="Descargar Excel">&#128196; Excel</button>
        <button id="btnPDF" type="button" class="btn-download btn-pdf" title="Descargar PDF">&#128196; PDF</button>
      </div>

      <!-- BLOQUE: ESTADO -->
      <div id="status" class="status">Cargando…</div>

      <!-- BLOQUE: RESULTADO -->
      <div id="result"></div>
    </div>

    <!-- BLOQUE: MODAL ABM -->
    <div id="modalOverlay" class="popup-overlay hidden">
      <div class="popup-box popup-box-form">
        <div class="popup-head">
          <div id="modalTitle" class="popup-title"></div>
          <button id="modalClose" type="button" class="popup-close">✕</button>
        </div>
        <div class="popup-body form-body">
          <div class="form-row">
            <label class="form-label">Cod</label>
            <input type="text" id="fCod" class="form-input" />
          </div>
          <div class="form-row">
            <label class="form-label">Artículo</label>
            <input type="text" id="fArticulo" class="form-input" readonly style="background:#f3f5f8;color:#555" />
          </div>
          <div class="form-row">
            <label class="form-label">Sector Proce</label>
            <input type="text" id="fSector" class="form-input" />
          </div>
          <div class="form-row">
            <label class="form-label">Descripción de partes</label>
            <input type="text" id="fDescripcion" class="form-input" readonly style="background:#f3f5f8;color:#555" />
          </div>
          <div class="form-row">
            <label class="form-label">Partes x Uni</label>
            <input type="number" id="fPartesUni" class="form-input" step="any" min="0" />
          </div>
          <div class="form-row">
            <label class="form-label">Partes x Cja</label>
            <input type="number" id="fPartesCja" class="form-input" step="any" min="0" />
          </div>
          <div class="form-row">
            <label class="form-label">Uni x Cja</label>
            <input type="number" id="fUniCja" class="form-input" step="any" min="0" />
          </div>
          <div id="formError" class="form-error hidden"></div>
          <div class="form-actions">
            <button type="button" id="btnGuardar" class="btn-guardar">Guardar</button>
            <button type="button" id="btnCancelarForm" class="btn-cancelar">Cancelar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- BLOQUE: MODAL CONFIRMAR ELIMINAR -->
    <div id="confirmOverlay" class="popup-overlay hidden">
      <div class="popup-box popup-box-confirm">
        <div class="popup-head">
          <div class="popup-title">Confirmar eliminación</div>
          <button id="confirmClose" type="button" class="popup-close">✕</button>
        </div>
        <div class="popup-body">
          <div class="popup-line" id="confirmMsg"></div>
          <div class="form-actions">
            <button type="button" id="btnConfirmEliminar" class="btn-eliminar-confirm">Eliminar</button>
            <button type="button" id="btnConfirmCancelar" class="btn-cancelar">Cancelar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- BLOQUE: MODAL DUPLICAR DESPIECE -->
    <div id="dupOverlay" class="popup-overlay hidden">
      <div class="popup-box popup-box-dup">
        <div class="popup-head">
          <div class="popup-title">Duplicar despiece</div>
          <button id="dupClose" type="button" class="popup-close">✕</button>
        </div>
        <div class="popup-body form-body">
          <!-- Paso 1: buscar artículo origen -->
          <div id="dupStep1">
            <div class="form-row">
              <label class="form-label">Código origen</label>
              <input type="text" id="dupCodOrigen" class="form-input" placeholder="Ej: 505" />
            </div>
            <div class="form-actions">
              <button type="button" id="btnDupBuscar" class="btn-guardar">Buscar</button>
              <button type="button" id="btnDupCancelar1" class="btn-cancelar">Cancelar</button>
            </div>
          </div>
          <!-- Paso 2: previsualizar y definir destino -->
          <div id="dupStep2" class="hidden">
            <div class="dup-info" id="dupInfo"></div>
            <div class="dup-preview-scroll">
              <table class="table dup-table" id="dupPreviewTable"></table>
            </div>
            <div class="form-row" style="margin-top:12px">
              <label class="form-label">Nuevo código</label>
              <input type="text" id="dupCodDestino" class="form-input" placeholder="Código del art. nuevo" />
            </div>
            <div class="form-row">
              <label class="form-label">Nuevo artículo</label>
              <input type="text" id="dupArtDestino" class="form-input" placeholder="Nombre del art. nuevo (opcional)" />
            </div>
            <div id="dupError" class="form-error hidden"></div>
            <div class="form-actions">
              <button type="button" id="btnDupEjecutar" class="btn-guardar">Duplicar</button>
              <button type="button" id="btnDupVolver" class="btn-cancelar">← Volver</button>
            </div>
          </div>
          <!-- Paso 3: resultado -->
          <div id="dupStep3" class="hidden">
            <div class="dup-resultado" id="dupResultado"></div>
            <div class="form-actions">
              <button type="button" id="btnDupCerrar" class="btn-guardar">Cerrar</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BLOQUE: MODAL CADENA CAUSA-EFECTO -->
    <div id="cadenaOverlay" class="popup-overlay hidden">
      <div class="popup-box popup-box-cadena">
        <div class="popup-head">
          <div id="cadenaTitle" class="popup-title">Cadena de fabricación</div>
          <button id="cadenaClose" type="button" class="popup-close">&times;</button>
        </div>
        <div class="popup-body">
          <div id="cadenaBody" class="cadena-body"></div>
        </div>
      </div>
    </div>

    <!-- BLOQUE: LIBS EXPORT -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>

    <!-- BLOQUE: JS -->
    <script src="Despiece.js?v=18"></script>
  </body>
</html>
