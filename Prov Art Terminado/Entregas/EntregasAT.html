<!doctype html>
<html lang="es">
<head>
  <script src="../../auth-guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entregas Prov. Art. Terminado</title>
  <link rel="stylesheet" href="EntregasAT.css" />
</head>
<body>

  <div class="card">
    <div class="header-bar">
      <div class="header-left">
        <button onclick="window.location.href='../../Inicio/index.html'" class="btn-home">← Inicio</button>
        <h1>Entregas Art. Terminado</h1>
        <button id="btnEnviar" class="btn-enviar hidden" type="button">Registrar</button>
      </div>

      <div class="header-right hidden" id="selectedBar">
        <button id="btnVolver" class="btn-volver" type="button">← Cambiar proveedor</button>
        <div id="selectedBadge" class="selected-badge"></div>
      </div>
    </div>

    <div id="status" class="status">Cargando proveedores...</div>

    <!-- Vista proveedores -->
    <div id="provGridWrap" class="selector-wrap hidden">
      <div id="provGrid" class="ps-grid"></div>
    </div>

    <!-- Vista detalle -->
    <div id="detailWrap" class="detail-wrap hidden">
      <div class="table-shell">
        <table class="table">
          <thead>
            <tr class="table-title-row">
              <th colspan="3" id="tableTitle">Proveedor</th>
            </tr>
            <tr>
              <th>Cod</th>
              <th>Artículo</th>
              <th>Cajas</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </div>
      <div class="bottom-actions">
        <div id="tableMsg" class="status"></div>
      </div>
    </div>

    <div id="successBox" class="successBox">
      <div class="title">Entrega registrada</div>
      <div>Tu código de entrega:</div>
      <div id="successCode" class="successCode">—</div>
      <button id="okBtn" class="okBtn" type="button">OK</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="EntregasAT.js"></script>
</body>
</html>
