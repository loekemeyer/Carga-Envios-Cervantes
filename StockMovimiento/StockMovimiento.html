<!doctype html>
<html lang="es">
  <head>
    <script src="../auth-guard.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Stock en Movimiento</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="StockMovimiento.css" />
  </head>
  <body>
    <div class="card">
      <button
        onclick="window.location.href = '../Inicio/index.html'"
        class="tallerista-btn btn-volver-home"
      >
        ← Volver al inicio
      </button>

      <h1>Stock en Movimiento</h1>

      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
        <input type="text" id="searchInput" class="search-input" style="margin-bottom:0;" placeholder="Buscar por matriz o descripción…" />
        <select id="selFiltroStock" class="search-input" style="margin-bottom:0;max-width:180px;">
          <option value="todos">Todos</option>
          <option value="conStock">Con stock</option>
          <option value="sinStock">Sin stock</option>
        </select>
      </div>

      <div id="status" class="status">Cargando...</div>

      <div id="result"></div>
    </div>

    <script src="StockMovimiento.js"></script>
  </body>
</html>
