<!doctype html>
<html lang="es">
<head>
  <script src="../auth-guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Control Carga Remitos</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../StockFlejes/stock-flejes.css" />
  <style>
    .page { max-width: 1100px; }
    #tbl { table-layout: fixed; }
    #tbl col.col-fecha    { width: 11%; }
    #tbl col.col-hora     { width: 9.5%; }
    #tbl col.col-cargasb  { width: 11%; }
    #tbl col.col-cod      { width: 9.5%; }
    #tbl col.col-nom      { width: 20%; }
    #tbl col.col-lin      { width: 7%; }
    #tbl col.col-tick     { width: 10%; }
    #tbl col.col-foto     { width: 10%; }
    #tbl col.col-codenv   { width: 12%; }
    .cod-envio { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 800; font-size: 16px; letter-spacing: 1px; }
    .demora { color:#b42318; font-weight:800; font-size:11px; margin-left:4px }
    .tick-ok  { color:#0a7a2f; font-weight:900; font-size:18px }
    .tick-no  { color:#b42318; font-weight:900; font-size:18px }
    .row-ok    td { background:#f3fbf6 !important }
    .row-warn  td { background:#fff8e6 !important }
    .row-bad   td { background:#fff0ef !important }
    .legend{display:flex;gap:14px;padding:8px 20px;font-size:13px;color:#555;background:#f9f9f9;border-bottom:1px solid #eee;flex-wrap:wrap}
    .legend span{display:inline-flex;align-items:center;gap:6px}
    .legend i{display:inline-block;width:14px;height:14px;border-radius:3px}
    .swatch-ok   { background:#f3fbf6;border:1px solid #c7e8d1 }
    .swatch-warn { background:#fff8e6;border:1px solid #f3deaa }
    .swatch-bad  { background:#fff0ef;border:1px solid #f5c2c0 }
  </style>
</head>
<body>
  <div class="page">
    <div class="sc-container">
      <div class="sc-header">
        <div class="sc-title">Control Carga Remitos</div>
        <button class="btn-inicio" onclick="window.location.href='../Inicio/index.html'">Atrás</button>
      </div>
      <div id="status" class="status"></div>

      <div class="sc-filters">
        <div class="field">
          <label for="fDesde">Desde</label>
          <input id="fDesde" type="date" />
        </div>
        <div class="field">
          <label for="fHasta">Hasta</label>
          <input id="fHasta" type="date" />
        </div>
        <div class="field">
          <label for="selTall">Tallerista</label>
          <select id="selTall">
            <option value="todos">Todos</option>
          </select>
        </div>
        <div class="field">
          <label for="selLinea">Línea</label>
          <select id="selLinea">
            <option value="todos">Todos</option>
            <option value="LK">LK</option>
            <option value="CH">CH</option>
          </select>
        </div>
        <div class="field">
          <label for="selEstado">Estado</label>
          <select id="selEstado">
            <option value="todos">Todos</option>
            <option value="completo">Completo (ISIS + foto)</option>
            <option value="incompleto">Incompleto</option>
            <option value="sinFoto">Sin foto</option>
          </select>
        </div>
      </div>

      <div class="legend">
        <span><i class="swatch-ok"></i>Completo (ISIS + foto)</span>
        <span><i class="swatch-bad"></i>Incompleto (falta algo)</span>
      </div>

      <table class="sc-table" id="tbl">
        <colgroup>
          <col class="col-fecha">
          <col class="col-hora">
          <col class="col-cargasb">
          <col class="col-cod">
          <col class="col-nom">
          <col class="col-lin">
          <col class="col-tick">
          <col class="col-foto">
          <col class="col-codenv">
        </colgroup>
        <thead>
          <tr class="header-sub">
            <th>Fecha<br>remito</th>
            <th>Hora<br>envío</th>
            <th>Hora<br>carga</th>
            <th>Cód<br>Tall</th>
            <th><br>Tallerista</th>
            <th><br>Línea</th>
            <th>Carga<br>ISIS</th>
            <th><br>Foto</th>
            <th>Cód<br>Envío</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="controlRemitos.js"></script>
</body>
</html>
