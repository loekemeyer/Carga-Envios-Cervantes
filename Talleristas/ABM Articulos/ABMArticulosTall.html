<!doctype html>
<html lang="es">
<head>
  <script src="../../auth-guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ABM Articulos x Tallerista</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="ABMArticulosTall.css" />
</head>
<body>

  <div class="card">

    <button onclick="window.location.href='../../Inicio/index.html'" class="tallerista-btn btn-volver-home">
      &larr; Volver al inicio
    </button>

    <h1>ABM Articulos x Tallerista</h1>

    <div class="row-tools">
      <button id="btnVolver" class="btn-volver hidden" type="button">
        &larr; Cambiar tallerista
      </button>
    </div>

    <div class="row">
      <div id="talleristasGrid" class="talleristas-grid"></div>
    </div>

    <div id="toolsRow" class="row hidden">
      <input id="txtBuscar" type="text" placeholder="Buscar por codigo, descripcion o linea..." class="input-buscar" />
      <button id="btnAgregar" type="button" class="btn-agregar">+ Agregar articulo</button>
    </div>

    <div id="status" class="status"></div>

    <div id="result"></div>
  </div>

  <!-- Modal agregar -->
  <div id="modalAgregar" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-head">
        <div class="modal-title">Agregar articulo</div>
        <button id="modalAgregarClose" type="button" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="inpLinea">Linea</label>
          <select id="inpLinea">
            <option value="LK">LK</option>
            <option value="CH">CH</option>
          </select>
        </div>
        <div class="field">
          <label for="inpCodArt">Codigo Articulo</label>
          <input id="inpCodArt" type="text" placeholder="Ej: 505" />
        </div>
        <div class="field">
          <label for="inpDesc">Descripcion</label>
          <input id="inpDesc" type="text" placeholder="Ej: Pelador Mgo Plastico" />
        </div>
        <div class="field">
          <label for="inpUniCaja">Unidades x Caja</label>
          <input id="inpUniCaja" type="number" min="1" value="12" />
        </div>
        <div class="field">
          <label for="inpCodTall">Codigo Tallerista (opcional)</label>
          <input id="inpCodTall" type="text" placeholder="Ej: 4175" />
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnCancelarAgregar" type="button" class="btn-cancelar">Cancelar</button>
        <button id="btnGuardarAgregar" type="button" class="btn-guardar">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal confirmar eliminar -->
  <div id="modalEliminar" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-head">
        <div class="modal-title">Confirmar eliminacion</div>
        <button id="modalEliminarClose" type="button" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="eliminarTexto" class="confirm-text"></div>
      </div>
      <div class="modal-footer">
        <button id="btnCancelarEliminar" type="button" class="btn-cancelar">Cancelar</button>
        <button id="btnConfirmarEliminar" type="button" class="btn-eliminar" style="height:40px;padding:0 20px;font-size:14px;">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="ABMArticulosTall.js"></script>

</body>
</html>
