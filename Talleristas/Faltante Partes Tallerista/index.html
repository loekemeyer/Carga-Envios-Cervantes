<!doctype html>
<html lang="es">
<head>
  <script src="../../auth-guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Faltante Partes Tallerista</title>

  <!-- Supabase (lo usa ControlTall.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- pdf.js para parsear las OCs en U:\AA  LOGISTICA\A3 OC Art Term -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }
  </script>

  <!-- CSS base reusado de Control Tall + propio -->
  <link rel="stylesheet" href="../Control Tall/ControlTall.css?v=20260522b" />
  <link rel="stylesheet" href="faltante.css?v=20260522b" />
</head>
<body>

  <div class="card">

    <button onclick="window.location.href='../../Inicio/index.html'" class="tallerista-btn btn-volver-home">
      ← Volver al inicio
    </button>

    <h1>Faltante Partes Tallerista</h1>
    <div class="muted">Items con % Lleno por debajo del umbral, agrupados por tallerista.</div>

    <div class="row controls-row">
      <label>Umbral % Lleno:
        <input id="umbralPct" type="number" min="0" max="100" step="1" value="25" /> %
      </label>
      <button id="btnRecargar" class="btn-recargar">Recargar</button>
      <button id="btnConectarOC" class="btn-conectar" title="Apuntar a la carpeta U:\AA  LOGISTICA\A3 OC Art Term\A2 OC Art Term VIGENTE (1 sola vez)">
        Conectar carpeta OC
      </button>
      <span id="myStatus" class="status"></span>
    </div>
    <div id="pdfStatus" class="pdf-status"></div>

    <div id="filtroTallsBar" class="filtro-talls-bar" aria-label="Filtro de talleristas a mostrar"></div>

    <div id="scrollTop" class="scroll-top"><div id="scrollTopInner" class="scroll-top-inner"></div></div>
    <div id="faltantePanel" class="faltante-panel"></div>
  </div>

  <!-- Hidden DOM hooks que requiere ControlTall.js para iniciar sin errores -->
  <div class="hidden" aria-hidden="true">
    <div id="talleristasGrid"></div>
    <div id="status"></div>
    <button id="btnVolver" type="button"></button>
    <div id="searchRow"><input id="txtBuscarTall" type="text" /></div>
    <div id="result"></div>
  </div>

  <!-- Cargamos ControlTall.js para reusar cargarConsumos, buscar, etc. -->
  <script src="../Control Tall/ControlTall.js?v=20260522b"></script>
  <!-- Logica propia del modulo -->
  <script src="faltante.js?v=20260522b"></script>

</body>
</html>
