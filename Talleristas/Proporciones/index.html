<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proporciones Articulo x Tallerista</title>
<link rel="stylesheet" href="proporciones.css">
</head>
<body>
<div class="card">
  <div class="header-row">
    <a href="../../Inicio/index.html" class="btn-back">← Volver al inicio</a>
    <h1>Proporciones Articulo x Tallerista</h1>
  </div>

  <p class="muted">
    Define el % de produccion de cada articulo cuando lo arman/entregan multiples talleristas.
    Solo aparecen los articulos compartidos (≥2 talleristas en Articulos VxT).
    Suma de proporciones por articulo deberia ser 100%.
  </p>

  <div class="row-tools">
    <input type="text" id="txtBuscar" placeholder="Buscar articulo (codigo o descripcion)..." class="search-input">
    <button id="btnRefrescar" class="btn-secondary">↻ Refrescar</button>
  </div>

  <div id="status" class="status"></div>

  <div id="contenedor" class="contenedor"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="proporciones.js"></script>
</body>
</html>
