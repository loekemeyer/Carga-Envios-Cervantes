<!doctype html>
<html lang="es">
  <head>
    <script src="../auth-guard.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Stock Transito PS</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="StockTransitoPS.css" />
  </head>
  <body>
    <div class="card">
      <button
        onclick="window.location.href = '../Inicio/index.html'"
        class="tallerista-btn btn-volver-home"
      >
        &larr; Volver al inicio
      </button>

      <h1>Stock en Transito PS</h1>
      <p class="subtitle">Piezas que vuelven de un Proveedor de Servicio sin sector destino y quedan en transito hasta el proximo envio.</p>

      <div class="toolbar">
        <input type="text" id="searchInput" class="search-input" placeholder="Buscar por parte, PS, proceso..." />
        <select id="filtroPS" class="filtro-select">
          <option value="">Todos los PS</option>
        </select>
        <select id="filtroStock" class="filtro-select">
          <option value="todos">Todos</option>
          <option value="conStock">Con stock en transito</option>
          <option value="sinStock">Sin stock</option>
        </select>
      </div>

      <div id="status" class="status">Cargando...</div>

      <div id="result"></div>
    </div>

    <script src="StockTransitoPS.js"></script>
  </body>
</html>
