<!doctype html>
<html lang="es">
<head>
<script src="../auth-guard.js"></script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Recepción Insumos</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#f5f6f8;padding:12px}
  .card{max-width:640px;margin:auto;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden}
  .header{background:#1a1a1a;color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
  .header h1{font-size:24px;font-weight:700;letter-spacing:.3px}
  .header button{background:#fff;color:#111;border:none;padding:8px 14px;border-radius:6px;font-weight:700;cursor:pointer;font-size:18px}

  .steps{padding:14px 18px}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0;align-items:center}
  label.lbl{font-weight:800;font-size:20px;min-width:80px}
  select,input[type="text"]{height:40px;border:2px solid #d0d7de;border-radius:8px;padding:0 10px;font-size:21px}
  select{min-width:160px}
  input[type="text"]{width:160px}

  .btn{padding:10px 16px;border-radius:8px;border:none;font-weight:800;cursor:pointer;font-size:20px}
  .btn-primary{background:#111;color:#fff}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-secondary{background:#fff;border:2px solid #d0d7de;color:#111}

  .status{margin:8px 0;font-size:20px;padding:6px 0}
  .ok{color:#0a7a2f}
  .bad{color:#b42318}

  .grid{display:grid;grid-template-columns:100px 80px minmax(180px,1fr);gap:8px;align-items:center}
  .grid .h{font-weight:900;font-size:18px;color:#333}
  .grid input[data-role="cant"]{width:100%;text-align:center;height:38px;border:2px solid #d0d7de;border-radius:8px;font-size:23px;font-weight:700}
  .grid input[data-role="cant"].has-val{border-color:#0a7a2f;background:#f3fbf6}
  .codeRO{background:#f6f8fa;width:100%;text-align:left;letter-spacing:0}
  .descCell{font-size:18px;color:#333;line-height:1.25;word-break:break-word}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:16px;z-index:100}
  .overlay.open{display:flex}
  .modal{width:min(720px,100%);max-height:90vh;overflow-y:auto;background:#fff;border-radius:14px;padding:14px;box-shadow:0 18px 50px rgba(0,0,0,.2)}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .modal-title{font-weight:900}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}
  .hint{font-size:17px;color:#666;margin-top:6px}

  .successBox{display:none;margin:12px 0;border:2px solid #c7e8d1;background:#f3fbf6;border-radius:12px;padding:16px;text-align:center}
  .successBox .title{font-weight:900;font-size:23px;margin-bottom:4px}

  .remito-row{margin:10px 0}
  .remito-row input{width:200px}

  .hidden{display:none}
  .provs-grid{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
  .prov-btn{padding:8px 14px;border-radius:8px;border:2px solid #d0d7de;background:#fff;font-weight:700;cursor:pointer;font-size:20px}
  .prov-btn.active{background:#111;color:#fff;border-color:#111}
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>Recepción Insumos</h1>
    <button onclick="window.location.href='../Inicio/index.html'">Atrás</button>
  </div>

  <div class="steps">
    <!-- Paso 1: Rubro -->
    <div id="step1">
      <div class="row">
        <label class="lbl">Rubro</label>
      </div>
      <div class="provs-grid" id="rubroGrid">
        <button class="prov-btn" data-rubro="Flejes">Flejes</button>
        <button class="prov-btn" data-rubro="Cajas">Cajas</button>
        <button class="prov-btn" data-rubro="Plasticos">Plásticos</button>
        <button class="prov-btn" data-rubro="Cartones">Cartones</button>
        <button class="prov-btn" data-rubro="Remaches">Remaches</button>
        <button class="prov-btn" data-rubro="Bombillas">Bombillas</button>
      </div>

      <!-- Paso 2: Proveedor -->
      <div id="provSection" class="hidden">
        <div class="row">
          <label class="lbl">Proveedor</label>
        </div>
        <div class="provs-grid" id="provGrid"></div>
      </div>

      <!-- Remito -->
      <div id="remitoSection" class="hidden remito-row">
        <div class="row">
          <label class="lbl">N° Remito</label>
          <input type="text" id="txtRemito" placeholder="Opcional">
        </div>
      </div>

      <div class="row" id="btnContinuarRow" class="hidden" style="display:none">
        <button id="btnContinuar" class="btn btn-primary" disabled>Cargar artículos</button>
      </div>
    </div>

    <div id="statusMsg" class="status"></div>
    <div id="successBox" class="successBox">
      <div class="title">Recepción registrada</div>
      <div id="successDetail"></div>
      <br>
      <button class="btn btn-primary" onclick="location.reload()">Nueva recepción</button>
    </div>
  </div>
</div>

<!-- Modal artículos -->
<div id="overlay" class="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Artículos</div>
      <button class="btn btn-secondary" id="closeModal">✕</button>
    </div>

    <div class="grid" style="margin-bottom:6px">
      <div class="h">Código</div>
      <div class="h">Cantidad</div>
      <div class="h">Descripción</div>
    </div>
    <div id="lines" class="grid"></div>

    <div class="hint">Completá solo las cantidades recibidas.</div>
    <div class="modal-actions">
      <button id="cancelModal" class="btn btn-secondary">Cancelar</button>
      <button id="sendModal" class="btn btn-primary">Registrar</button>
    </div>
    <div id="modalMsg" class="status"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
"use strict";

const SUPABASE_URL = "https://hrxfctzncixxqmpfhskv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhyeGZjdHpuY2l4eHFtcGZoc2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjQyNjEsImV4cCI6MjA4ODMwMDI2MX0.4L6wguch8UZGhC2VpzrWcCjJGUV-IkYsl9JoCWrOLUs";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Proveedores por rubro
const PROVEEDORES = {
  Flejes: ["Basconia","Aperam","Hermac","Brawin","Altrak","Szapiro","EstaMetal","JL Metales","Alami"],
  Cajas: ["Corrugadora"],
  Plasticos: ["Pat Bet Plast","Rodar","Telleria","Maspoli","Pintos","Martin Faccolo","JL Matriceria","Capuchon Mariposa","Base Afila","M. Pelador","Terrero","Mangos Abrelata","Regatones","Bujes Abrelatas","Mango Ergon.","Mangos NM","Packaging y Serv"],
  Cartones: ["Grafica Pol"],
  Remaches: ["Bella Vista","Dilmax","Electronica Mandelli","Imel"],
  Bombillas: ["Por definir"]
};

// Tablas fuente por rubro
const TABLAS = {
  Flejes:    { tabla: "Flejes",           colCod: "N Fleje",  colDesc: "Descripción",          colProv: "Proveedor" },
  Cajas:     { tabla: "Cajas",            colCod: "N_Caja",   colDesc: "Cod_ISIS_LK",          colProv: null },
  Plasticos: { tabla: "Partes_Plasticas", colCod: "Cod_ISIS", colDesc: "Descripcion",          colProv: "Proveedor" },
  Cartones:  { tabla: "Despiece x Articulo", colCod: "COD",  colDesc: "Descripcion de partes", colProv: null, filtro: { col: "Rubro", val: "Cartones" } },
  // Remaches: especial - une Remaches SC + Remaches SP. Manejado por separado en cargarRemaches().
  Remaches:  { especial: "remaches" },
  Bombillas: { tabla: "Bombillas",        colCod: "Sector",   colDesc: "Descripcion",          colProv: "Proveedor" }
};

let rubroSel = "";
let provSel = "";
let items = [];

const rubroGrid = document.getElementById("rubroGrid");
const provSection = document.getElementById("provSection");
const provGrid = document.getElementById("provGrid");
const remitoSection = document.getElementById("remitoSection");
const btnContinuarRow = document.getElementById("btnContinuarRow");
const btnContinuar = document.getElementById("btnContinuar");
const statusMsg = document.getElementById("statusMsg");
const successBox = document.getElementById("successBox");
const successDetail = document.getElementById("successDetail");
const overlay = document.getElementById("overlay");
const linesWrap = document.getElementById("lines");
const modalTitle = document.getElementById("modalTitle");
const modalMsg = document.getElementById("modalMsg");
const txtRemito = document.getElementById("txtRemito");

function esc(s) { return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function arDateISO() {
  return new Intl.DateTimeFormat("sv-SE",{timeZone:"America/Argentina/Buenos_Aires",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date());
}

// ===== Rubro =====
rubroGrid.querySelectorAll(".prov-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    rubroSel = btn.dataset.rubro;
    rubroGrid.querySelectorAll(".prov-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderProveedores();
  });
});

function renderProveedores() {
  const provs = PROVEEDORES[rubroSel] || [];
  provGrid.innerHTML = "";
  provSel = "";

  if (provs.length === 1) {
    provSel = provs[0];
    provSection.classList.add("hidden");
  } else {
    provs.forEach(p => {
      const btn = document.createElement("button");
      btn.className = "prov-btn";
      btn.textContent = p;
      btn.addEventListener("click", () => {
        provSel = p;
        provGrid.querySelectorAll(".prov-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        updateReady();
      });
      provGrid.appendChild(btn);
    });
    provSection.classList.remove("hidden");
  }

  remitoSection.classList.remove("hidden");
  updateReady();
}

function updateReady() {
  const ok = rubroSel && provSel;
  btnContinuar.disabled = !ok;
  btnContinuarRow.style.display = "";
}

// ===== Cargar artículos =====
btnContinuar.addEventListener("click", async () => {
  btnContinuar.disabled = true;
  statusMsg.textContent = "Cargando artículos...";
  statusMsg.className = "status";

  try {
    const cfg = TABLAS[rubroSel];
    let data, error;

    if (cfg.especial === "remaches") {
      // Remaches: une Remaches SC + Remaches SP filtrando por proveedor
      const [scRes, spRes] = await Promise.all([
        sb.from("Remaches SC").select("*").eq("Proveedor", provSel),
        sb.from("Remaches SP").select("*").eq("Proveedor", provSel)
      ]);
      if (scRes.error) throw scRes.error;
      if (spRes.error) throw spRes.error;
      const scRows = (scRes.data || []).map(r => ({ cod: r["SC"], desc: r["Descripción"] }));
      const spRows = (spRes.data || []).map(r => ({ cod: r["SP"], desc: r["Descripción"] }));
      data = [...scRows, ...spRows];
      data.sort((a,b) => String(a.cod).localeCompare(String(b.cod), "es"));
    } else {
      let query = sb.from(cfg.tabla).select("*");
      if (cfg.colProv && provSel) query = query.eq(cfg.colProv, provSel);
      if (cfg.filtro) query = query.eq(cfg.filtro.col, cfg.filtro.val);
      const res = await query.order(cfg.colCod, { ascending: true });
      if (res.error) throw res.error;
      data = (res.data || []).map(r => ({
        cod: String(r[cfg.colCod] ?? "").trim(),
        desc: String(r[cfg.colDesc] ?? "").trim()
      }));
    }

    const seen = new Set();
    items = data.filter(r => {
      const cod = String(r.cod ?? "").trim();
      if (!cod || seen.has(cod)) return false;
      seen.add(cod);
      return true;
    }).map(r => ({
      codigo: String(r.cod).trim(),
      descripcion: String(r.desc ?? "").trim(),
      _cant: ""
    }));

    if (!items.length) {
      statusMsg.textContent = "No hay artículos para este proveedor.";
      statusMsg.className = "status bad";
      btnContinuar.disabled = false;
      return;
    }

    statusMsg.textContent = "";
    modalTitle.textContent = `${provSel} — ${items.length} artículos`;
    buildModal();
    overlay.classList.add("open");

  } catch (err) {
    console.error(err);
    statusMsg.textContent = "Error: " + err.message;
    statusMsg.className = "status bad";
    btnContinuar.disabled = false;
  }
});

// ===== Modal =====
function buildModal() {
  linesWrap.innerHTML = "";
  modalMsg.textContent = "";

  items.forEach((item, i) => {
    const code = document.createElement("input");
    code.type = "text";
    code.value = item.codigo;
    code.readOnly = true;
    code.className = "codeRO";

    const cant = document.createElement("input");
    cant.type = "text";
    cant.inputMode = "numeric";
    cant.placeholder = "0";
    cant.setAttribute("data-role", "cant");
    cant.setAttribute("data-idx", String(i));
    cant.value = item._cant || "";

    cant.addEventListener("input", () => {
      cant.value = cant.value.replace(/\D/g, "");
      items[i]._cant = cant.value;
      cant.classList.toggle("has-val", cant.value !== "" && cant.value !== "0");
    });

    cant.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        const next = linesWrap.querySelector(`input[data-role="cant"][data-idx="${i+1}"]`);
        if (next) next.focus();
      }
    });

    const desc = document.createElement("div");
    desc.className = "descCell";
    desc.textContent = item.descripcion;

    linesWrap.appendChild(code);
    linesWrap.appendChild(cant);
    linesWrap.appendChild(desc);
  });

  const first = linesWrap.querySelector('input[data-role="cant"][data-idx="0"]');
  if (first) first.focus();
}

function closeModalFn() {
  overlay.classList.remove("open");
  btnContinuar.disabled = false;
}

document.getElementById("closeModal").onclick = closeModalFn;
document.getElementById("cancelModal").onclick = closeModalFn;
overlay.addEventListener("click", e => { if (e.target === overlay) closeModalFn(); });

// ===== Enviar =====
document.getElementById("sendModal").addEventListener("click", async () => {
  const toSend = items.filter(it => it._cant && Number(it._cant) > 0);
  if (!toSend.length) {
    modalMsg.textContent = "Completá al menos una cantidad.";
    modalMsg.className = "status bad";
    return;
  }

  const resumen = toSend.map(it => `${it.codigo}: ${it._cant}`).join("\n");
  if (!confirm(`Registrar recepción de ${provSel}?\n\n${resumen}`)) return;

  const sendBtn = document.getElementById("sendModal");
  sendBtn.disabled = true;
  modalMsg.textContent = "Guardando...";
  modalMsg.className = "status";

  try {
    const remito = txtRemito.value.trim();
    const registros = toSend.map(it => ({
      fecha: arDateISO(),
      proveedor: provSel,
      rubro: rubroSel,
      codigo: it.codigo,
      descripcion: it.descripcion,
      cantidad: Number(it._cant),
      unidad: rubroSel === "Cajas" ? "Cajas" : "Uni",
      remito: remito || null
    }));

    const { error } = await sb.from("Recepcion_Insumos").insert(registros);
    if (error) throw error;

    overlay.classList.remove("open");
    successDetail.textContent = `${toSend.length} artículo(s) de ${provSel} · Remito: ${remito || "—"}`;
    successBox.style.display = "block";
    statusMsg.textContent = "";

  } catch (err) {
    console.error(err);
    modalMsg.textContent = "Error: " + err.message;
    modalMsg.className = "status bad";
    sendBtn.disabled = false;
  }
});
</script>
</body>
</html>
