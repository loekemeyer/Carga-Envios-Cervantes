<!doctype html>
<html lang="es">
<head>
  <script src="../auth-guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stock Cartones</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="stock-flejes.css" />
  <style>
    /* Comprimir columnas para reducir desperdicio visual */
    .page { max-width: 1050px; }
    #tblStock, #tblPliegos { table-layout: fixed; }
    #tblStock col.col-marca   { width: 9%; }
    #tblStock col.col-tipo    { width: 9%; }
    #tblStock col.col-cod     { width: 14%; }
    #tblStock col.col-sector  { width: 14%; }
    #tblStock col.col-num     { width: 18%; }
    #tblPliegos col.col-proc  { width: 16%; }
    #tblPliegos col.col-tipo  { width: 14%; }
    #tblPliegos col.col-cod   { width: 16%; }
    #tblPliegos col.col-sec   { width: 14%; }
    #tblPliegos col.col-num   { width: 20%; }
  </style>
</head>
<body>
  <div class="page">
    <div class="sc-container">
      <div class="sc-header">
        <div class="sc-title">Stock Cartones</div>
        <button class="btn-inicio" onclick="window.location.href='../Inicio/index.html'">Atrás</button>
      </div>
      <div id="status" class="status"></div>

      <div class="sc-filters">
        <div class="field">
          <label for="txtBuscar">Buscar</label>
          <input id="txtBuscar" type="text" placeholder="Código o tipo..." />
        </div>
        <div class="field">
          <label for="selMarca">Marca</label>
          <select id="selMarca">
            <option value="todos">Todos</option>
            <option value="Lok">Lok</option>
            <option value="LK">LK</option>
            <option value="CH">CH</option>
          </select>
        </div>
        <div class="field">
          <label for="selTipo">Tipo</label>
          <select id="selTipo">
            <option value="todos">Todos</option>
            <option value="Abl">Abl</option>
            <option value="Pel">Pel</option>
            <option value="Sac">Sac</option>
            <option value="Ute">Ute</option>
            <option value="Huv">Huv</option>
            <option value="Co8">Co8</option>
            <option value="Ban">Ban</option>
            <option value="Lok">Lok</option>
          </select>
        </div>
        <div class="field">
          <label for="selStock">Stock</label>
          <select id="selStock">
            <option value="todos">Todos</option>
            <option value="conStock">Con stock</option>
            <option value="sinStock">Sin stock</option>
          </select>
        </div>
        <div class="field">
          <label for="selTallerista">Tallerista</label>
          <select id="selTallerista">
            <option value="todos">Todos</option>
          </select>
        </div>
      </div>

      <div style="padding:10px 20px;background:#f9f9f9;border-bottom:1px solid #eee;display:flex;justify-content:flex-end">
        <button id="btnGenerarPDF" class="btn-generar" type="button">Generar Pedido PDF</button>
      </div>

      <table class="sc-table" id="tblStock">
        <colgroup>
          <col class="col-marca">
          <col class="col-tipo">
          <col class="col-cod">
          <col class="col-sector">
          <col class="col-num">
          <col class="col-num">
          <col class="col-num">
        </colgroup>
        <thead>
          <tr class="header-sub">
            <th><br>Marca</th>
            <th><br>Tipo</th>
            <th><br>Código</th>
            <th><br>Sector</th>
            <th><br>Pedido</th>
            <th>Stock<br>Max</th>
            <th>Stock<br>Online</th>
          </tr>
        </thead>
        <tbody id="tblBody"></tbody>
      </table>

      <!-- PLIEGOS AJ ADHESIVOS -->
      <div class="sc-title" style="margin-top:32px;margin-bottom:0;padding:12px 20px;border-bottom:2px solid #111">Pliegos</div>
      <table class="sc-table" id="tblPliegos">
        <colgroup>
          <col class="col-proc">
          <col class="col-tipo">
          <col class="col-cod">
          <col class="col-sec">
          <col class="col-num">
          <col class="col-num">
        </colgroup>
        <thead>
          <tr class="header-sub">
            <th><br>Proceso</th>
            <th><br>Tipo</th>
            <th><br>Código</th>
            <th><br>Sector</th>
            <th>Stock<br>Max</th>
            <th>Stock<br>Online</th>
          </tr>
        </thead>
        <tbody id="tblPliegosBody"></tbody>
      </table>

      <div id="popupDetalle" class="popup-detalle hidden">
        <div class="popup-detalle-content">
          <div class="popup-detalle-header">
            <span id="popupTitulo"></span>
            <button id="popupCerrar" type="button">✕</button>
          </div>
          <div id="popupBody"></div>
        </div>
      </div>

      <div id="popupEnviosDetalle" class="popup-envios-detalle hidden">
        <div class="popup-envios-detalle-header">
          <span>Envíos a Talleristas</span>
          <button onclick="document.getElementById('popupEnviosDetalle').classList.add('hidden')" type="button">✕</button>
        </div>
        <table><tbody id="popupEnviosDetalleBody"></tbody></table>
      </div>
    </div>
  </div>

  <script src="cartones.js"></script>
</body>
</html>
