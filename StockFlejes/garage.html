<!doctype html>
<html lang="es">
<head>
  <script src="../auth-guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stock Garage (GRJ)</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="stock-flejes.css" />
  <style>
    /* Garage tiene pocas columnas y pocos GRJs — reducir ancho del card */
    .page { max-width: 950px; }
    #tblStock { table-layout: fixed; }
    #tblStock col.col-cod   { width: 10%; }
    #tblStock col.col-desc-grj { width: 22%; }
    #tblStock col.col-comp  { width: 18%; }
    #tblStock col.col-num   { width: 12.5%; }
    #tblStock td.td-comp {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="sc-container">
      <div class="sc-header">
        <div class="sc-title">Stock Garage (GRJ)</div>
        <button class="btn-inicio" onclick="window.location.href='../Inicio/index.html'">Atrás</button>
      </div>
      <div id="status" class="status"></div>

      <div class="sc-filters">
        <div class="field">
          <label for="txtBuscar">Buscar</label>
          <input id="txtBuscar" type="text" placeholder="Descripción o GRJ..." />
        </div>
        <div class="field">
          <label for="selStock">Stock</label>
          <select id="selStock">
            <option value="todos">Todos</option>
            <option value="conStock">Con stock</option>
            <option value="sinStock">Sin stock</option>
          </select>
        </div>
      </div>

      <table class="sc-table" id="tblStock">
        <colgroup>
          <col class="col-cod">
          <col class="col-desc-grj">
          <col class="col-comp">
          <col class="col-num">
          <col class="col-num">
          <col class="col-num">
          <col class="col-num">
        </colgroup>
        <thead>
          <tr class="header-sub">
            <th><br>Cod GRJ</th>
            <th><br>Descripción</th>
            <th><br>Componentes</th>
            <th>Stock<br>Inicial</th>
            <th>+<br>Entregas</th>
            <th>−<br>Envíos</th>
            <th>=<br>Stock Online</th>
          </tr>
        </thead>
        <tbody id="tblBody"></tbody>
      </table>

      <div id="popupDetalle" class="popup-detalle hidden">
        <div class="popup-detalle-content">
          <div class="popup-detalle-header">
            <span id="popupTitulo"></span>
            <button id="popupCerrar" type="button">✕</button>
          </div>
          <div id="popupBody"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="garage.js"></script>
</body>
</html>
