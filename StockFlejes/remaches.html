<!doctype html>
<html lang="es">
<head>
  <script src="../auth-guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stock Remaches</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="stock-flejes.css" />
  <style>
    /* Distribuir ancho de columnas proporcionalmente */
    #tblStock { table-layout: fixed; }
    #tblStock col.col-sc    { width: 6%; }
    #tblStock col.col-sp    { width: 6%; }
    #tblStock col.col-descr { width: 22%; }
    #tblStock col.col-prov  { width: 12%; }
    #tblStock col.col-kg    { width: 7%; }
    #tblStock col.col-scu   { width: 8%; }
    #tblStock col.col-sck   { width: 8%; }
    #tblStock col.col-scc   { width: 8%; }
    #tblStock col.col-spu   { width: 8%; }
    #tblStock col.col-spk   { width: 8%; }
    #tblStock col.col-spb   { width: 8%; }
    /* Filtro de unidad: oculta columnas que no corresponden.
       Default (Todo): muestra uni + kg, oculta cajon/bolsa.
       Cajón/Bolsa: muestra solo cajon/bolsa, oculta uni y kg. */
    #tblStock col.col-scc,
    #tblStock col.col-spb,
    #tblStock th.th-scc,
    #tblStock th.th-spb,
    #tblStock td.td-scc,
    #tblStock td.td-spb { display: none; }
    #tblStock.unidad-uni col.col-sck,
    #tblStock.unidad-uni col.col-spk,
    #tblStock.unidad-uni th.th-sck,
    #tblStock.unidad-uni th.th-spk,
    #tblStock.unidad-uni td.td-sck,
    #tblStock.unidad-uni td.td-spk { display: none; }
    #tblStock.unidad-kg col.col-scu,
    #tblStock.unidad-kg col.col-spu,
    #tblStock.unidad-kg th.th-scu,
    #tblStock.unidad-kg th.th-spu,
    #tblStock.unidad-kg td.td-scu,
    #tblStock.unidad-kg td.td-spu { display: none; }
    /* Cajón/Bolsa: ocultar uni + kg, mostrar cajon/bolsa */
    #tblStock.unidad-cajbol col.col-scu,
    #tblStock.unidad-cajbol col.col-spu,
    #tblStock.unidad-cajbol col.col-sck,
    #tblStock.unidad-cajbol col.col-spk,
    #tblStock.unidad-cajbol th.th-scu,
    #tblStock.unidad-cajbol th.th-spu,
    #tblStock.unidad-cajbol th.th-sck,
    #tblStock.unidad-cajbol th.th-spk,
    #tblStock.unidad-cajbol td.td-scu,
    #tblStock.unidad-cajbol td.td-spu,
    #tblStock.unidad-cajbol td.td-sck,
    #tblStock.unidad-cajbol td.td-spk { display: none; }
    #tblStock.unidad-cajbol col.col-scc,
    #tblStock.unidad-cajbol col.col-spb,
    #tblStock.unidad-cajbol th.th-scc,
    #tblStock.unidad-cajbol th.th-spb,
    #tblStock.unidad-cajbol td.td-scc,
    #tblStock.unidad-cajbol td.td-spb { display: table-cell; }
  </style>
</head>
<body>
  <div class="page">
    <div class="sc-container">
      <div class="sc-header">
        <div class="sc-title">Stock Remaches</div>
        <button class="btn-inicio" onclick="window.location.href='../Inicio/index.html'">Atrás</button>
      </div>
      <div id="status" class="status"></div>

      <div class="sc-filters">
        <div class="field">
          <label for="txtBuscar">Buscar</label>
          <input id="txtBuscar" type="text" placeholder="Descripción, sector o proveedor..." />
        </div>
        <div class="field">
          <label for="selProv">Proveedor</label>
          <select id="selProv">
            <option value="todos">Todos</option>
          </select>
        </div>
        <div class="field">
          <label for="selStock">Stock</label>
          <select id="selStock">
            <option value="todos">Todos</option>
            <option value="conStock">Con stock (SC o SP)</option>
            <option value="sinStock">Sin stock (SC y SP)</option>
          </select>
        </div>
        <div class="field">
          <label for="selUnidad">Unidad</label>
          <select id="selUnidad">
            <option value="todo">Todo (uni + kg)</option>
            <option value="uni">Uni</option>
            <option value="kg">Kg</option>
            <option value="cajbol">Cajón / Bolsa</option>
          </select>
        </div>
      </div>

      <table class="sc-table" id="tblStock">
        <colgroup>
          <col class="col-sc">
          <col class="col-sp">
          <col class="col-descr">
          <col class="col-prov">
          <col class="col-kg">
          <col class="col-scu">
          <col class="col-sck">
          <col class="col-scc">
          <col class="col-spu">
          <col class="col-spk">
          <col class="col-spb">
        </colgroup>
        <thead>
          <tr class="header-main">
            <th rowspan="2">SC</th>
            <th rowspan="2">SP</th>
            <th rowspan="2">Descripción</th>
            <th rowspan="2">Proveedor</th>
            <th rowspan="2">Kg x<br>Uni</th>
            <th id="thSC" colspan="2">SC</th>
            <th id="thSP" colspan="2">SP</th>
          </tr>
          <tr class="header-sub">
            <th class="th-scu">Stock<br>Online (uni)</th>
            <th class="th-sck">Stock<br>Online (kg)</th>
            <th class="th-scc">Cajones<br>(25 kg)</th>
            <th class="th-spu">Stock<br>Online (uni)</th>
            <th class="th-spk">Stock<br>Online (kg)</th>
            <th class="th-spb">Bolsas</th>
          </tr>
        </thead>
        <tbody id="tblBody"></tbody>
      </table>

      <div id="popupDetalle" class="popup-detalle hidden">
        <div class="popup-detalle-content">
          <div class="popup-detalle-header">
            <span id="popupTitulo"></span>
            <button id="popupCerrar" type="button">✕</button>
          </div>
          <div id="popupBody"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="remaches.js"></script>
</body>
</html>
