<!doctype html>
<html lang="es">
<head>
  <script src="../auth-guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stock Flejes</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="stock-flejes.css" />
  <style>
    /* Comprimir columnas para reducir desperdicio visual */
    .page { max-width: 1050px; }
    #tblStock { table-layout: fixed; }
    #tblStock col.col-prov    { width: 11%; }
    #tblStock col.col-nfleje  { width: 9%; }
    #tblStock col.col-desc    { width: 31%; }
    #tblStock col.col-med     { width: 11%; }
    #tblStock col.col-num     { width: 12.66%; }
    #tblStock td.col-desc {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="sc-container">
      <div class="sc-header">
        <div class="sc-title">Stock Flejes</div>
        <button class="btn-inicio" onclick="window.location.href='../Inicio/index.html'">Atrás</button>
      </div>
      <div id="status" class="status"></div>

      <div class="sc-filters">
        <div class="field">
          <label for="txtBuscar">Buscar</label>
          <input id="txtBuscar" type="text" placeholder="Fleje, desc o prov..." />
        </div>
        <div class="field">
          <label for="selProv">Proveedor</label>
          <select id="selProv">
            <option value="todos">Todos</option>
          </select>
        </div>
        <div class="field">
          <label for="selStock">Stock</label>
          <select id="selStock">
            <option value="todos">Todos</option>
            <option value="conStock">Con stock</option>
            <option value="sinStock">Sin stock</option>
          </select>
        </div>
      </div>

      <div style="padding:10px 20px;background:#f9f9f9;border-bottom:1px solid #eee;display:flex;justify-content:flex-end">
        <button id="btnGenerarPDF" class="btn-generar" type="button">Generar Pedido PDF</button>
      </div>

      <table class="sc-table" id="tblStock">
        <colgroup>
          <col class="col-prov">
          <col class="col-nfleje">
          <col class="col-desc">
          <col class="col-med">
          <col class="col-num">
          <col class="col-num">
          <col class="col-num">
        </colgroup>
        <thead>
          <tr class="header-sub">
            <th><br>Prov</th>
            <th>N°<br>Fleje</th>
            <th><br>Descripción</th>
            <th>Medida<br>mm</th>
            <th><br>Pedido</th>
            <th>Stock<br>Max</th>
            <th>Stock<br>Online</th>
          </tr>
        </thead>
        <tbody id="tblBody"></tbody>
      </table>

      <div id="popupDetalle" class="popup-detalle hidden">
        <div class="popup-detalle-content">
          <div class="popup-detalle-header">
            <span id="popupTitulo"></span>
            <button id="popupCerrar" type="button">✕</button>
          </div>
          <div id="popupBody"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="stock-flejes.js?v=20260522a"></script>
</body>
</html>
