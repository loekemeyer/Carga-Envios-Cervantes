<!doctype html>
<html lang="es">
<head>
  <script src="../auth-guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stock Cajas</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="stock-flejes.css" />
  <style>
    /* Layout unificado con resto de submodulos: tabla compacta dentro de card limitado. */
    .page { max-width: 950px; }
    .modo-btns{display:flex;gap:10px;padding:14px 20px;background:#f9f9f9;border-bottom:1px solid #eee}
    .modo-btn{padding:10px 20px;border:2px solid #d0d7de;border-radius:8px;background:#fff;font-weight:800;font-size:21px;cursor:pointer}
    .modo-btn.active{background:#111;color:#fff;border-color:#111}
  </style>
</head>
<body>
  <div class="page">
    <div class="sc-container">
      <div class="sc-header">
        <div class="sc-title">Stock Cajas</div>
        <button class="btn-inicio" onclick="window.location.href='../Inicio/index.html'">Atrás</button>
      </div>
      <div id="status" class="status"></div>

      <div class="modo-btns">
        <button class="modo-btn active" id="btnModoStock" type="button">Ver Stock</button>
        <button class="modo-btn" id="btnModoPedido" type="button">Generar Pedido</button>
      </div>

      <div class="sc-filters">
        <div class="field">
          <label for="txtBuscar">Buscar</label>
          <input id="txtBuscar" type="text" placeholder="N° caja..." />
        </div>
        <div class="field">
          <label for="selTallerista">Tallerista</label>
          <select id="selTallerista">
            <option value="todos">Todos</option>
          </select>
        </div>
        <div class="field" id="filtroStockField">
          <label for="selStock">Stock</label>
          <select id="selStock">
            <option value="todos">Todos</option>
            <option value="conStock">Con stock</option>
            <option value="sinStock">Sin stock</option>
          </select>
        </div>
        <div class="field">
          <label>Paq x 25</label>
          <span style="font-size:20px;font-weight:700;align-self:center">Corrugadora</span>
        </div>
        <div class="field">
          <label for="numMeses">Meses</label>
          <input id="numMeses" type="number" value="4" min="1" max="24" step="1" style="width:60px" />
        </div>
      </div>

      <div id="pdfBar" style="padding:10px 20px;background:#f9f9f9;border-bottom:1px solid #eee;display:none;justify-content:flex-end">
        <button id="btnGenerarPDF" class="btn-generar" type="button">Generar Pedido PDF</button>
      </div>

      <div id="tblStockWrap">
        <table class="sc-table" id="tblStock">
          <thead id="tblHead"></thead>
          <tbody id="tblBody"></tbody>
        </table>
      </div>

      <div id="popupDetalle" class="popup-detalle hidden">
        <div class="popup-detalle-content">
          <div class="popup-detalle-header">
            <span id="popupTitulo"></span>
            <button id="popupCerrar" type="button">✕</button>
          </div>
          <div id="popupBody"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="cajas.js"></script>
</body>
</html>
